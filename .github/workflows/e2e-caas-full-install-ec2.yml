---
name: E2E CaaS Full Install (EC2)

permissions:
  contents: read

# Suite-specific: provisions an ephemeral EC2 bare-metal box (via
# ec2-runner-provision.yml), runs a Netris-free CaaS install/test flow on
# it, and tears it down (via ec2-runner-teardown.yml). This mirrors
# osac-test-infra PR #232's "E2E CaaS Full Install" mechanism (cluster-tool
# boot + real OSAC install + a local libvirt "agent" VM standing in for a
# discoverable bare-metal host, no Netris SDN simulation at all) -- proven
# working there (a real dispatch passed end-to-end in ~1h4m) -- but running
# on our own dedicated EC2 fleet instead of the shared "osac-ci" runners,
# since these ephemeral boxes are never bootstrapped via machine-init.sh
# and so need their own from-scratch cluster-tool/virtualization bootstrap
# (see the "Bootstrap cluster-tool and virtualization prerequisites" step
# below). This is a separate, additional job -- e2e-caas-netris.yml (the
# Netris-SDN golden-snapshot job) is untouched and still the one with
# Netris-specific network-automation coverage.
on:
  workflow_call:
    inputs:
      instance-type:
        description: "EC2 instance type"
        required: false
        type: string
        default: "c5n.metal"
      aws-region:
        description: "AWS region to launch into"
        required: false
        type: string
        default: "us-east-1"
      orchestrator-runner-label:
        description: "Self-hosted runner label for the orchestrator (dedicated, not the shared osac-ci fleet, so it's never queued behind existing e2e jobs)"
        required: false
        type: string
        default: "osac-ci-orchestrator"
      tooling-check-cmds:
        description: "Semicolon-separated commands to run/verify on the box before JIT registration. Installs the packages cluster-tool and setup-caas-agents.sh need (libvirt/qemu-kvm/virt-install/podman/skopeo/zstd/pigz/jq/haproxy/git) -- the stateful bootstrap (cluster-tool clone/config, haproxy base config, agent storage dir) happens in the test job itself, since it needs multi-line logic tooling-check-cmds can't express."
        required: false
        type: string
        default: "dnf install -y libvirt qemu-kvm virt-install podman skopeo zstd pigz jq haproxy git; systemctl enable --now libvirtd; command -v virt-install"
      test-suite:
        description: "Test suite to run: caas, or empty string for all"
        required: false
        type: string
        default: "caas"
      test-filter:
        description: "pytest -k filter expression (optional)"
        required: false
        type: string
        default: ""
      namespace:
        description: "OSAC namespace on the cluster"
        required: false
        type: string
        default: "osac-e2e-ci"
      cluster-template:
        description: "Cluster template for CaaS tests"
        required: false
        type: string
        default: "osac.templates.ocp_ci_small"
      flavor-image:
        description: "OCI image containing the cluster-tool flavor"
        required: false
        type: string
        default: "quay.io/osac-project/cluster-flavors:sno-4-22"
      flavor-name:
        description: "cluster-tool flavor name"
        required: false
        type: string
        default: "sno-4-22"
      caas-domain:
        description: "Base domain for CaaS hosted clusters and DNS"
        required: false
        type: string
        default: "ecoeng-osac-ci.devcluster.openshift.com"
      image-overrides:
        description: "JSON object mapping Helm value paths to image refs, e.g. '{\"service.images.service\":\"ghcr.io/osac-project/fulfillment-service:pr-123\"}'"
        required: false
        type: string
        default: "{}"
      installer-ref:
        description: "Branch/ref of osac-installer to clone for the deploy step"
        required: false
        type: string
        default: "main"
      installer-repo:
        description: "GitHub repo (owner/name) to clone osac-installer from"
        required: false
        type: string
        default: "osac-project/osac-installer"
      test-infra-repository:
        description: "Repository to checkout for tests/Containerfile (for cross-repo calls)"
        required: false
        type: string
        default: ""
      test-infra-ref:
        description: "Git ref of test infrastructure repository"
        required: false
        type: string
        default: ""
      component-repo:
        description: "GitHub repo (owner/name) of a component to build from source. Requires component-ref and component-image-key."
        required: false
        type: string
        default: ""
      component-ref:
        description: "Branch or tag name of the component repository to build (must be a named ref, not a SHA)"
        required: false
        type: string
        default: ""
      component-image-key:
        description: "Helm value path for the component image (e.g. service.images.service)"
        required: false
        type: string
        default: ""
      component-containerfile:
        description: "Path to Containerfile relative to component repo root"
        required: false
        type: string
        default: "Containerfile"
      component-build-type:
        description: "Build method: 'containerfile' (default) or 'ansible-builder'"
        required: false
        type: string
        default: "containerfile"
      osac-cli-version:
        description: "OSAC CLI version for the test image (e.g. 0.0.73). Defaults to latest GitHub release."
        required: false
        type: string
        default: ""
      notify-on-failure:
        description: "Send Slack notification on failure (typically set for scheduled runs)"
        required: false
        type: boolean
        default: false
    outputs:
      result:
        description: "Overall result: PASSED or FAILED"
        value: ${{ jobs.test.outputs.result }}

jobs:
  provision:
    uses: ./.github/workflows/ec2-runner-provision.yml
    permissions:
      contents: read
    with:
      instance-type: ${{ inputs.instance-type }}
      aws-region: ${{ inputs.aws-region }}
      orchestrator-runner-label: ${{ inputs.orchestrator-runner-label }}
      tooling-check-cmds: ${{ inputs.tooling-check-cmds }}

  # Fetches pull-secret/AAP-license/AWS-credentials and pushes them to the
  # box, on the orchestrator -- not the box itself. Same rationale as
  # e2e-caas-netris.yml's own push-secrets job: the ephemeral box was never
  # bootstrapped with the Vault SSH-tunnel/AppRole setup persistent
  # machines like the orchestrator have. See
  # push-caas-fullinstall-secrets.sh's header for the full rationale.
  push-secrets:
    needs: provision
    runs-on: ${{ inputs.orchestrator-runner-label }}
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      # Must match ec2-runner-provision.yml's derivation exactly.
      KNOWN_HOSTS_FILE: /tmp/osac-ec2-known-hosts-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate and bootstrap
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ec2-runner
          run-id: ${{ github.run_id }}

      - name: Fetch pull secret, AAP license, and AWS credentials from Vault
        id: vault-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: http://127.0.0.1:8200
          method: approle
          roleId: ${{ steps.setup.outputs.role-id }}
          secretId: ${{ steps.setup.outputs.secret-id }}
          exportEnv: false
          secrets: |
            secret/data/osac/e2e/pull-secret dockerconfigjson | PULL_SECRET ;
            secret/data/osac/e2e/aap-license license | AAP_LICENSE ;
            secret/data/osac/e2e/aws-credentials access_key_id | AWS_ACCESS_KEY_ID ;
            secret/data/osac/e2e/aws-credentials secret_access_key | AWS_SECRET_ACCESS_KEY

      - name: Write pull secret and AAP license to temp files
        shell: bash
        env:
          PULL_SECRET: ${{ steps.vault-secrets.outputs.PULL_SECRET }}
          AAP_LICENSE: ${{ steps.vault-secrets.outputs.AAP_LICENSE }}
        run: |
          printf '%s' "${PULL_SECRET}" > "$RUNNER_TEMP/pull-secret.json"
          chmod 600 "$RUNNER_TEMP/pull-secret.json"
          printf '%s' "${AAP_LICENSE}" | base64 -d > "$RUNNER_TEMP/aap-license.zip"
          chmod 600 "$RUNNER_TEMP/aap-license.zip"

      - name: Push CaaS full-install secrets to ephemeral box
        shell: bash
        env:
          SSH_USER: ${{ needs.provision.outputs.ssh-user }}
          PUBLIC_IP: ${{ needs.provision.outputs.public-ip }}
          AWS_ACCESS_KEY_ID: ${{ steps.vault-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AAP_LICENSE_ZIP_PATH: ${{ runner.temp }}/aap-license.zip
          PULL_SECRET_JSON_PATH: ${{ runner.temp }}/pull-secret.json
        run: |
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/push-caas-fullinstall-secrets.sh

  test:
    needs: [provision, push-secrets]
    # 360m (6h): generous upper bound, matching e2e-caas-netris.yml -- this
    # mechanism's own reference run (PR #232, shared fleet, no bootstrap
    # needed there) took ~1h4m; ours adds a from-scratch cluster-tool/
    # virtualization bootstrap on top, untested combination.
    runs-on: ${{ needs.provision.outputs.runner-label }}
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      FLAVOR_LOCK: "/tmp/cluster-tool-flavor-${{ inputs.flavor-name }}.lock"
    outputs:
      result: ${{ steps.test.outcome == 'success' && 'PASSED' || 'FAILED' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.test-infra-repository || github.repository }}
          ref: ${{ inputs.test-infra-ref || '' }}
          persist-credentials: false

      - name: Stage CaaS full-install secrets into place
        shell: bash
        env:
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: ./scripts/ec2-runner/stage-caas-fullinstall-secrets.sh

      # This ephemeral box is never bootstrapped via machine-init.sh (unlike
      # the shared "osac-ci" fleet PR #232 targets), so cluster-tool and
      # setup-caas-agents.sh's own prerequisites don't exist here yet --
      # tooling-check-cmds (above, before JIT registration) only installs
      # packages; this step does the stateful setup that needs multi-line
      # logic. Ported from infra/netris/roles/build_fresh_flavor/tasks/
      # main.yml, which already proved this exact bootstrap works on an
      # identical never-machine-init.sh'd EC2 box.
      - name: Bootstrap cluster-tool and virtualization prerequisites
        shell: bash
        run: |
          set -euo pipefail

          echo "=== cluster-tool ==="
          CLUSTER_TOOL_DIR=/opt/cluster-tool
          CLUSTER_TOOL_BIN=/usr/local/bin/cluster-tool
          CLUSTER_TOOL_DATA=/var/lib/cluster-tool
          if [[ ! -f "${CLUSTER_TOOL_BIN}" ]]; then
            git clone https://github.com/osac-project/cluster-tool.git "${CLUSTER_TOOL_DIR}"
            install -m 0755 "${CLUSTER_TOOL_DIR}/cluster-tool" "${CLUSTER_TOOL_BIN}"
          fi

          mkdir -p /root/.config/cluster-tool
          if [[ ! -f /root/.config/cluster-tool/config ]]; then
            echo "CLUSTER_TOOL_DATA=${CLUSTER_TOOL_DATA}" > /root/.config/cluster-tool/config
          fi
          mkdir -p "${CLUSTER_TOOL_DATA}"/{flavors,overlays,tmp,containers/storage}

          if [[ ! -f /root/.config/cluster-tool/cluster-tool.key ]]; then
            ssh-keygen -t ed25519 -f /root/.config/cluster-tool/cluster-tool.key -N '' -q
          fi
          if [[ ! -f /root/.config/cluster-tool/servers.json ]]; then
            echo '{"servers": {"local": {"host": "local"}}, "default": "local"}' \
              > /root/.config/cluster-tool/servers.json
          fi

          echo "=== haproxy ==="
          # cluster-tool boot's "Configuring access" step shells out to
          # `cat /etc/haproxy/haproxy.cfg` and rewrites it to add per-clone
          # frontends/backends -- it doesn't create the base file itself
          # (that's machine-init.sh's own server-provisioning job). Write
          # cluster-tool's own documented base config verbatim.
          if [[ ! -f /etc/haproxy/haproxy.cfg ]]; then
            cat > /etc/haproxy/haproxy.cfg <<'HAPROXY_EOF'
          global
              log         127.0.0.1 local2
              chroot      /var/lib/haproxy
              pidfile     /var/run/haproxy.pid
              maxconn     4000
              user        haproxy
              group       haproxy
              daemon
              stats socket /var/lib/haproxy/stats

          defaults
              mode                    tcp
              log                     global
              option                  tcplog
              option                  dontlognull
              retries                 3
              timeout connect         10s
              timeout client          1m
              timeout server          1m
              maxconn                 3000

          frontend api
              bind *:6443
              tcp-request inspect-delay 5s
              tcp-request content accept if { req_ssl_hello_type 1 }
              default_backend api-fallback

          backend api-fallback
              server fallback 127.0.0.1:1 check

          frontend ingress-https
              bind *:443
              tcp-request inspect-delay 5s
              tcp-request content accept if { req_ssl_hello_type 1 }
              default_backend ingress-https-fallback

          backend ingress-https-fallback
              server fallback 127.0.0.1:1 check

          frontend ingress-http
              bind *:80
              mode http
              default_backend ingress-http-fallback

          backend ingress-http-fallback
              mode http
              server fallback 127.0.0.1:1 check
          HAPROXY_EOF
          fi
          systemctl enable --now haproxy

          echo "=== agent VM storage ==="
          mkdir -p /data/osac-storage

      - name: Validate and bootstrap
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ${{ inputs.test-suite || 'caas' }}
          run-id: ${{ github.run_id }}
          component-repo: ${{ inputs.component-repo }}
          component-ref: ${{ inputs.component-ref }}
          component-image-key: ${{ inputs.component-image-key }}

      - name: Prepare cluster environment
        env:
          FLAVOR_IMAGE: ${{ inputs.flavor-image }}
          FLAVOR_NAME: ${{ inputs.flavor-name }}
        run: |
          DIGEST_FILE="/tmp/cluster-tool-flavor-${FLAVOR_NAME}.digest"
          REMOTE_DIGEST=$(skopeo inspect "docker://${FLAVOR_IMAGE}" --format '{{.Digest}}' 2>/dev/null || echo "")

          exec 9>"${FLAVOR_LOCK}"
          flock --exclusive 9
          echo "Acquired flavor lock."

          LOCAL_DIGEST=""
          if [[ -f "${DIGEST_FILE}" ]]; then
            LOCAL_DIGEST=$(cat "${DIGEST_FILE}")
          fi

          FLAVOR_EXISTS=false
          if /usr/local/bin/cluster-tool flavors 9>&- \
               | grep -q "^${FLAVOR_NAME} "; then
            FLAVOR_EXISTS=true
          fi

          NEED_PULL=false
          if ${FLAVOR_EXISTS}; then
            if [[ -n "${REMOTE_DIGEST}" ]] && [[ "${REMOTE_DIGEST}" == "${LOCAL_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' is up to date — skipping pull."
            elif [[ -n "${REMOTE_DIGEST}" ]] && [[ -z "${LOCAL_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' already present, seeding digest file."
              echo "${REMOTE_DIGEST}" > "${DIGEST_FILE}"
            elif [[ -n "${REMOTE_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' image changed — deleting and re-pulling..."
              /usr/local/bin/cluster-tool flavors --delete "${FLAVOR_NAME}" 9>&- || true
              NEED_PULL=true
            else
              echo "Flavor '${FLAVOR_NAME}' already present, could not check remote digest — skipping pull."
            fi
          else
            echo "Flavor '${FLAVOR_NAME}' not found — pulling..."
            NEED_PULL=true
          fi

          if ${NEED_PULL}; then
            /usr/local/bin/cluster-tool pull "${FLAVOR_IMAGE}" 9>&-
            if [[ -n "${REMOTE_DIGEST}" ]]; then
              echo "${REMOTE_DIGEST}" > "${DIGEST_FILE}"
            fi
          fi

          exec 9>&-
          echo "Released flavor lock."

          /usr/local/bin/cluster-tool destroy "${CLONE_NAME}" 2>/dev/null || true
          BRIDGE_PREFIX="br-${CLONE_NAME:0:8}"
          for br in $(ip -o link show | grep -oP "${BRIDGE_PREFIX}[^ @]*"); do
            echo "Removing stale bridge ${br}..."
            ip link set "${br}" down 2>/dev/null || true
            ip link delete "${br}" 2>/dev/null || true
          done

      - name: Boot cluster clone
        env:
          FLAVOR_NAME: ${{ inputs.flavor-name }}
        run: |
          exec 9>"${FLAVOR_LOCK}"
          flock --shared 9
          /usr/local/bin/cluster-tool boot \
            --flavor "${FLAVOR_NAME}" --name "${CLONE_NAME}" \
            --pull-secret "$RUNNER_TEMP/pull-secret.json" 9>&-
          exec 9>&-

          echo "Cluster clone '${CLONE_NAME}' booted."

          cp "${HOME}/.kube/${CLONE_NAME}.kubeconfig" "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"

      - name: Build and load component image
        if: inputs.component-repo != ''
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          COMPONENT_REPO: ${{ inputs.component-repo }}
          COMPONENT_REF: ${{ inputs.component-ref }}
          COMPONENT_FILE: ${{ inputs.component-containerfile }}
          COMPONENT_IMAGE_KEY: ${{ inputs.component-image-key }}
          COMPONENT_BUILD_TYPE: ${{ inputs.component-build-type }}
        run: |
          COMPONENT_TAG="localhost/component-pr:${GITHUB_RUN_ID}"

          echo "Cloning ${COMPONENT_REPO}@${COMPONENT_REF}..."
          git clone --depth 1 --branch "${COMPONENT_REF}" \
            "https://github.com/${COMPONENT_REPO}.git" "$RUNNER_TEMP/component-src"

          SRC="$RUNNER_TEMP/component-src"
          if [[ "${COMPONENT_BUILD_TYPE}" == "ansible-builder" ]]; then
            echo "Generating build context with ansible-builder from ${COMPONENT_FILE}..."
            python3 -m pip install --quiet ansible-builder
            ansible-builder create --file "${SRC}/${COMPONENT_FILE}" --context "${SRC}/context"
            podman build -t "${COMPONENT_TAG}" -f "${SRC}/context/Containerfile" "${SRC}/context"
          else
            echo "Building image from ${COMPONENT_FILE}..."
            podman build -t "${COMPONENT_TAG}" -f "${SRC}/${COMPONENT_FILE}" "${SRC}"
          fi

          if [[ "${COMPONENT_REPO}" == *"fulfillment-service"* ]]; then
            echo "Building osac CLI from source..."
            (cd "${SRC}" && CGO_ENABLED=0 go build -o "$RUNNER_TEMP/osac-cli-bin" ./cmd/osac)
            echo "OSAC_CLI_BIN=$RUNNER_TEMP/osac-cli-bin" >> "$GITHUB_ENV"
          fi

          NODE_NAME=$(oc get nodes -o jsonpath='{.items[0].metadata.name}')
          echo "Loading image onto node ${NODE_NAME}..."
          podman save "${COMPONENT_TAG}" | \
            oc debug "node/${NODE_NAME}" -t=false -- \
              chroot /host podman load

          echo "COMPONENT_IMAGE=${COMPONENT_TAG}" >> "$GITHUB_ENV"
          echo "COMPONENT_REPO_NAME=${COMPONENT_REPO}" >> "$GITHUB_ENV"
          echo "COMPONENT_REF_NAME=${COMPONENT_REF}" >> "$GITHUB_ENV"

          # Not removed here (unlike an earlier version of this step) --
          # replace-installer-submodule.sh, below, needs this directory
          # after osac-installer is cloned.

      - name: Build test image
        env:
          E2E_IMAGE: "osac-e2e-tests:${{ github.run_id }}"
          OSAC_VERSION: ${{ inputs.osac-cli-version }}
        run: |
          BUILD_ARGS="--build-arg OSAC_VERSION=${OSAC_VERSION}"
          if [[ -n "${OSAC_CLI_BIN:-}" ]] && [[ -f "${OSAC_CLI_BIN}" ]]; then
            cp "${OSAC_CLI_BIN}" ./osac-cli-bin
            BUILD_ARGS="--build-arg OSAC_CLI_BIN=osac-cli-bin"
          fi
          podman build --no-cache ${BUILD_ARGS} -t "${E2E_IMAGE}" -f Containerfile .
          rm -f ./osac-cli-bin

      - name: Prepare cluster prerequisites
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
        run: |
          echo "Waiting for CatalogSource redhat-operators to be READY..."
          oc wait --for=jsonpath='{.status.connectionState.lastObservedState}'=READY \
            catalogsource/redhat-operators -n openshift-marketplace --timeout=300s

          echo "Patching OVN masquerade subnet to 169.254.0.0/17..."
          oc patch networks.operator.openshift.io cluster --type=merge \
            -p '{"spec":{"defaultNetwork":{"ovnKubernetesConfig":{"gatewayConfig":{"ipv4":{"internalMasqueradeSubnet":"169.254.0.0/17"}}}}}}'
          oc delete pod -n openshift-network-operator -l name=network-operator
          echo "Waiting 180s for OVN to stabilize..."
          sleep 180
          oc rollout status ds/ovnkube-node -n openshift-ovn-kubernetes --timeout=300s

          echo "Applying KubeletConfig (maxPods: 500)..."
          cat <<'KUBELET_EOF' | oc apply -f -
          apiVersion: machineconfiguration.openshift.io/v1
          kind: KubeletConfig
          metadata:
            name: set-master-max-pods
          spec:
            machineConfigPoolSelector:
              matchLabels:
                pools.operator.machineconfiguration.openshift.io/master: ""
            kubeletConfig:
              maxPods: 500
          KUBELET_EOF
          echo "Waiting for MCP master to finish updating (node will reboot on SNO)..."
          oc wait --for=condition=Updated mcp/master --timeout=600s
          echo "Waiting 180s for MCP to settle..."
          sleep 180

      - name: Install infrastructure operators
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          INSTALLER_NAMESPACE: ${{ inputs.namespace }}
          INSTALLER_REF: ${{ inputs.installer-ref }}
          INSTALLER_REPO: ${{ inputs.installer-repo }}
        run: |
          if ! command -v helm &>/dev/null; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          if ! command -v yq &>/dev/null; then
            YQ_VERSION="v4.53.3"
            YQ_SHA256="fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4"
            YQ_DIR="${RUNNER_TEMP}/bin"
            mkdir -p "${YQ_DIR}"
            curl -fsSL -o "${YQ_DIR}/yq" \
              "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
            echo "${YQ_SHA256}  ${YQ_DIR}/yq" | sha256sum -c -
            chmod +x "${YQ_DIR}/yq"
            export PATH="${YQ_DIR}:${PATH}"
            echo "${YQ_DIR}" >> "$GITHUB_PATH"
          fi

          INSTALLER_DIR="$RUNNER_TEMP/osac-installer"
          git clone --recurse-submodules --depth 1 --branch "${INSTALLER_REF}" \
            "https://github.com/${INSTALLER_REPO}.git" "${INSTALLER_DIR}"
          cd "${INSTALLER_DIR}"

          # Ensures CRDs/RBAC/Helm templates come from the same commit as
          # the built image when testing a component PR -- matches
          # e2e-vmaas-full-install.yml/e2e-bmaas-full-install.yml's own
          # call (a no-op when component-repo wasn't set).
          bash "${GITHUB_WORKSPACE}/.github/scripts/replace-installer-submodule.sh" \
            "${INSTALLER_DIR}" "$RUNNER_TEMP/component-src"

          make install-operators VALUES_FILE=values/caas-ci/values.yaml
          make install-prereqs VALUES_FILE=values/caas-ci/values.yaml

      - name: Install OSAC
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          INSTALLER_NAMESPACE: ${{ inputs.namespace }}
          IMAGE_OVERRIDES: ${{ inputs.image-overrides }}
          COMPONENT_IMAGE_KEY: ${{ inputs.component-image-key }}
          CAAS_DOMAIN: ${{ inputs.caas-domain }}
          AWS_CREDS_FILE: ${{ runner.temp }}/aws-credentials.env
        run: |
          INSTALLER_DIR="$RUNNER_TEMP/osac-installer"
          cd "${INSTALLER_DIR}"

          make install-osac VALUES_FILE=values/caas-ci/values.yaml

          # shellcheck disable=SC1090
          source "${AWS_CREDS_FILE}"

          oc patch configmap cluster-fulfillment-ig -n "${INSTALLER_NAMESPACE}" --type=merge \
            -p "{\"data\":{
                \"DNS_ZONE\":\"${CAAS_DOMAIN}\",
                \"EXTERNAL_ACCESS_BASE_DOMAIN\":\"${CAAS_DOMAIN}\",
                \"EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS\":\"${CAAS_DOMAIN}\",
                \"HOSTED_CLUSTER_BASE_DOMAIN\":\"${CAAS_DOMAIN}\"
            }}"

          oc get secret cluster-fulfillment-ig -n "${INSTALLER_NAMESPACE}" >/dev/null 2>&1 || \
              oc create secret generic cluster-fulfillment-ig -n "${INSTALLER_NAMESPACE}"
          oc patch secret cluster-fulfillment-ig -n "${INSTALLER_NAMESPACE}" --type=merge \
            -p "{\"stringData\":{
                \"AWS_ACCESS_KEY_ID\":\"${AWS_ACCESS_KEY_ID}\",
                \"AWS_SECRET_ACCESS_KEY\":\"${AWS_SECRET_ACCESS_KEY}\"
            }}"

          MERGED_OVERRIDES="${IMAGE_OVERRIDES}"
          if [[ -n "${COMPONENT_IMAGE:-}" ]] && [[ -n "${COMPONENT_IMAGE_KEY}" ]]; then
            if [[ "${COMPONENT_IMAGE_KEY}" == *.repository ]]; then
              IMG_REPO="${COMPONENT_IMAGE%%:*}"
              IMG_TAG="${COMPONENT_IMAGE#*:}"
              TAG_KEY="${COMPONENT_IMAGE_KEY%.repository}.tag"
              PULL_KEY="${COMPONENT_IMAGE_KEY%.repository}.pullPolicy"
              MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
                jq -c --arg rk "${COMPONENT_IMAGE_KEY}" --arg rv "${IMG_REPO}" \
                      --arg tk "${TAG_KEY}" --arg tv "${IMG_TAG}" \
                      --arg pk "${PULL_KEY}" --arg pv "IfNotPresent" \
                      '. + {($rk): $rv, ($tk): $tv, ($pk): $pv}')
            else
              MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
                jq -c --arg k "${COMPONENT_IMAGE_KEY}" --arg v "${COMPONENT_IMAGE}" '. + {($k): $v}')
            fi
          fi

          if [[ "${COMPONENT_IMAGE_KEY}" == "aap.bootstrap.image" && -n "${COMPONENT_REF_NAME:-}" ]]; then
            AAP_GIT_URI="https://github.com/${COMPONENT_REPO_NAME}"
            MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
              jq -c --arg bk "aap.configAsCode.projectGitBranch" --arg bv "${COMPONENT_REF_NAME}" \
                    --arg uk "aap.configAsCode.projectGitUri" --arg uv "${AAP_GIT_URI}" \
                    '. + {($bk): $bv, ($uk): $uv}')
          fi

          if [[ -n "${MERGED_OVERRIDES}" ]] && [[ "${MERGED_OVERRIDES}" != "{}" ]]; then
            echo "Applying image overrides..."
            SET_ARGS=()
            for key in $(echo "${MERGED_OVERRIDES}" | jq -r 'keys[]'); do
              value=$(echo "${MERGED_OVERRIDES}" | jq -r --arg k "${key}" '.[$k]')
              SET_ARGS+=("--set-string" "${key}=${value}")
              echo "  --set-string ${key}=${value}"
            done

            yq -i '(.dependencies[].version) = "0.0.0"' charts/osac/Chart.yaml
            helm dependency update charts/osac/
            helm upgrade osac charts/osac/ \
              --namespace "${INSTALLER_NAMESPACE}" \
              --reuse-values \
              --no-hooks \
              "${SET_ARGS[@]}" \
              --timeout 10m \
              --wait
          fi

      # Runs as root (confirmed our whole pipeline already does, unlike the
      # shared "osac-ci" fleet's non-root github-runner user) -- per this
      # script's own header, root gets "direct root access for DNS" as an
      # alternative to the osac-hosts-entry/sudoers wrapper PR #232 sets up
      # for a non-root CI user, so that machinery isn't needed here.
      - name: Setup CaaS agent
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          INSTALLER_NAMESPACE: ${{ inputs.namespace }}
        run: |
          INSTALLER_DIR="$RUNNER_TEMP/osac-installer"

          LIBVIRT_NETWORK="test-infra-net-${CLONE_NAME}" \
          INSTALLER_NAMESPACE="${INSTALLER_NAMESPACE}" \
          AGENT_VM_NAME="agent-${CLONE_NAME}" \
          AGENT_VM_STORAGE_DIR="/data/osac-storage" \
              bash "${INSTALLER_DIR}/scripts/setup-caas-agents.sh"

      - name: Run E2E tests
        id: test
        env:
          TEST_SUITE: ${{ inputs.test-suite }}
          TEST_FILTER: ${{ inputs.test-filter }}
          OSAC_NAMESPACE: ${{ inputs.namespace }}
          OSAC_CLUSTER_TEMPLATE: ${{ inputs.cluster-template }}
          E2E_IMAGE: "osac-e2e-tests:${{ github.run_id }}"
        run: |
          KUBECONFIG_PATH="$RUNNER_TEMP/kubeconfig"

          TEST_ARGS="tests/"
          if [ -n "${TEST_SUITE}" ]; then
            TEST_ARGS="tests/${TEST_SUITE}/"
          fi

          FILTER_ARGS=""
          if [ -n "${TEST_FILTER}" ]; then
            FILTER_ARGS="-k ${TEST_FILTER}"
          fi

          mkdir -p "$RUNNER_TEMP/test-output"

          rm -f "$RUNNER_TEMP/caas_ssh_key" "$RUNNER_TEMP/caas_ssh_key.pub"
          ssh-keygen -t ed25519 -f "$RUNNER_TEMP/caas_ssh_key" -N '' -q

          podman run --rm --network=host \
            -v "${KUBECONFIG_PATH}":/root/.kube/config:ro,Z \
            -v "${RUNNER_TEMP}/pull-secret.json":/root/pull-secret:ro,Z \
            -v "${RUNNER_TEMP}/aap-license.zip":/root/aap-license.zip:ro,Z \
            -v "${RUNNER_TEMP}/caas_ssh_key.pub":/root/.ssh/id_rsa.pub:ro,Z \
            -v "${RUNNER_TEMP}/test-output":/tmp/test-output:Z \
            -e KUBECONFIG=/root/.kube/config \
            -e OSAC_NAMESPACE="${OSAC_NAMESPACE}" \
            -e OSAC_CLUSTER_TEMPLATE="${OSAC_CLUSTER_TEMPLATE}" \
            -e OSAC_PULL_SECRET_PATH=/root/pull-secret \
            "${E2E_IMAGE}" \
            pytest ${TEST_ARGS} ${FILTER_ARGS} \
              --junitxml=/tmp/test-output/junit.xml -v

      - name: Gather artifacts
        if: always()
        uses: ./.github/actions/gather-artifacts
        with:
          namespace: ${{ inputs.namespace }}
          kubeconfig-path: ${{ runner.temp }}/kubeconfig
          artifact-name: osac-logs-caas-full-install-ec2-${{ github.run_id }}
          junit-path: ${{ runner.temp }}/test-output/junit.xml

      - name: Gather EC2 runner artifacts
        if: always()
        uses: ./.github/actions/gather-ec2-runner-artifacts

      # No agent-VM-specific cleanup needed here (unlike PR #232's
      # teardown.sh, which has to virsh-destroy/undefine the agent VM and
      # rm its qcow2/ISO to avoid leaking on the shared, persistent "osac-ci"
      # fleet) -- this box is single-use and gets fully terminated by
      # ec2-runner-teardown.yml below, so there's nothing to leak between
      # runs.

      - name: Notify Slack on failure
        if: always() && failure() && inputs.notify-on-failure
        uses: ./.github/actions/notify-slack
        with:
          status: failure
          workflow-name: "E2E CaaS Full Install (EC2)"
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch-name: ${{ github.ref_name }}
          commit-sha: ${{ github.sha }}
          artifact-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts

  teardown:
    needs: [provision, push-secrets, test]
    if: always()
    uses: ./.github/workflows/ec2-runner-teardown.yml
    permissions:
      contents: read
    with:
      instance-id: ${{ needs.provision.outputs.instance-id }}
      runner-id: ${{ needs.provision.outputs.runner-id }}
      orchestrator-runner-label: ${{ inputs.orchestrator-runner-label }}
      aws-region: ${{ inputs.aws-region }}
