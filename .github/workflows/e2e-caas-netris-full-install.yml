---
name: E2E CaaS Netris Full Install

permissions:
  contents: read

# Suite-specific: provisions an ephemeral EC2 bare-metal box (via
# ec2-runner-provision.yml), runs a hybrid CaaS/Netris install/test flow on
# it, and tears it down (via ec2-runner-teardown.yml).
#
# Combines the fast, single-boot cluster-tool mechanism (proven in
# osac-test-infra PR #232 and this repo's own e2e-caas-full-install-ec2.yml
# prototype) with e2e-caas-netris.yml's real Netris SDN
# networking/bare-metal discovery, instead of either e2e-caas-netris.yml's
# double-boot+recert golden-snapshot flow (build once, snapshot, then
# recert-transplant the identity into Netris's VPC -- ~15-20min of
# certificate/identity rewriting done twice) or PR #232/e2e-caas-full-
# install-ec2.yml's single local libvirt "agent" VM standing in for
# discoverable bare metal (no real Netris coverage at all).
#
# The OCP control plane here is a cluster-tool clone -- it is NOT placed
# inside a Netris-managed VPC (unlike e2e-caas-netris.yml's control plane).
# This works because OSAC's Netris integration only needs a route to
# NETRIS_CONTROLLER_URL from AAP's executor pods, not VPC membership for
# the control plane itself: cluster-tool's own haproxy already reverse-
# proxies OCP API/ingress (6443/443/80) on every host interface, including
# br-mgmt (the plain Linux bridge Netris's own controller/agents live on),
# and libvirt's own NAT-network forwarding already lets pods reach br-mgmt
# outbound. See the OSAC-2801-caas-netris-hybrid-install plan for the full
# design rationale and the ansible-role changes (netris_configure,
# osac_post_refresh, caas_discovery) this depends on.
on:
  workflow_call:
    inputs:
      instance-type:
        description: "EC2 instance type"
        required: false
        type: string
        default: "c5n.metal"
      aws-region:
        description: "AWS region to launch into"
        required: false
        type: string
        default: "us-east-1"
      orchestrator-runner-label:
        description: "Self-hosted runner label for the orchestrator (dedicated, not the shared osac-ci fleet, so it's never queued behind existing e2e jobs)"
        required: false
        type: string
        default: "osac-ci-orchestrator"
      tooling-check-cmds:
        description: "Semicolon-separated commands to run/verify on the box before JIT registration. Installs both cluster-tool's virtualization stack and the Netris lab's ansible stack -- the stateful bootstrap (cluster-tool clone/config, haproxy base config, SSH keypair, openssl-libs regression workaround) happens in the test job itself, since it needs multi-line logic (and, for the openssl-libs workaround, warm dnf metadata -- see the Bootstrap step) that tooling-check-cmds can't express."
        required: false
        type: string
        default: "dnf install -y libvirt qemu-kvm virt-install podman skopeo zstd pigz jq haproxy git ansible-core python3-pip make; systemctl enable --now libvirtd; pip3 install ansible; command -v virt-install; command -v ansible-playbook; command -v make"
      test-filter:
        description: "pytest -k filter expression (optional)"
        required: false
        type: string
        default: ""
      namespace:
        description: "OSAC namespace on the cluster"
        required: false
        type: string
        default: "osac-e2e-ci"
      flavor-image:
        description: "OCI image containing the cluster-tool flavor"
        required: false
        type: string
        default: "quay.io/osac-project/cluster-flavors:sno-4-22"
      flavor-name:
        description: "cluster-tool flavor name"
        required: false
        type: string
        default: "sno-4-22"
      fulfillment-service-branch:
        description: "Branch/tag of fulfillment-service to build the osac CLI from for this job (e.g. a feature branch or a released tag like v0.0.73) -- empty means main. Consumed by infra/netris/roles/lab_setup for both provisioning's own osac usage and the test container's osac binary."
        required: false
        type: string
        default: ""
      image-overrides:
        description: "JSON object mapping Helm value paths to image refs, e.g. '{\"service.images.service\":\"ghcr.io/osac-project/fulfillment-service:pr-123\"}'"
        required: false
        type: string
        default: "{}"
      installer-ref:
        description: "Branch/ref of osac-installer to clone for the deploy step"
        required: false
        type: string
        default: "main"
      installer-repo:
        description: "GitHub repo (owner/name) to clone osac-installer from"
        required: false
        type: string
        default: "osac-project/osac-installer"
      test-infra-repository:
        description: "Repository to checkout for tests/Containerfile (for cross-repo calls)"
        required: false
        type: string
        default: ""
      test-infra-ref:
        description: "Git ref of test infrastructure repository"
        required: false
        type: string
        default: ""
      component-repo:
        description: "GitHub repo (owner/name) of a component to build from source. Requires component-ref and component-image-key."
        required: false
        type: string
        default: ""
      component-ref:
        description: "Branch or tag name of the component repository to build (must be a named ref, not a SHA)"
        required: false
        type: string
        default: ""
      component-image-key:
        description: "Helm value path for the component image (e.g. service.images.service)"
        required: false
        type: string
        default: ""
      component-containerfile:
        description: "Path to Containerfile relative to component repo root"
        required: false
        type: string
        default: "Containerfile"
      component-build-type:
        description: "Build method: 'containerfile' (default) or 'ansible-builder'"
        required: false
        type: string
        default: "containerfile"
      osac-cli-version:
        description: "OSAC CLI version for the test image (e.g. 0.0.73). Defaults to latest GitHub release."
        required: false
        type: string
        default: ""
      notify-on-failure:
        description: "Send Slack notification on failure (typically set for scheduled runs)"
        required: false
        type: boolean
        default: false
    outputs:
      result:
        description: "Overall result: PASSED or FAILED"
        value: ${{ jobs.test.outputs.result }}

jobs:
  provision:
    uses: ./.github/workflows/ec2-runner-provision.yml
    permissions:
      contents: read
    with:
      instance-type: ${{ inputs.instance-type }}
      aws-region: ${{ inputs.aws-region }}
      orchestrator-runner-label: ${{ inputs.orchestrator-runner-label }}
      tooling-check-cmds: ${{ inputs.tooling-check-cmds }}

  # Same 5 secrets e2e-caas-netris.yml already needs (pull-secret,
  # AAP license, Netris license, Route53 creds) -- this flow needs real
  # Netris + real Route53-backed hosted-cluster DNS exactly like that flow
  # does, unlike e2e-caas-full-install-ec2.yml's push-secrets (which only
  # needed generic AWS creds for a fulfillment-ig AWS patch that doesn't
  # apply here -- Route53 creds replace it, wired via configure-netris-hybrid
  # instead of a direct patch in this workflow).
  push-secrets:
    needs: provision
    runs-on: ${{ inputs.orchestrator-runner-label }}
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      KNOWN_HOSTS_FILE: /tmp/osac-ec2-known-hosts-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate and bootstrap
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ec2-runner
          run-id: ${{ github.run_id }}

      - name: Fetch pull secret and AAP license from Vault
        id: vault-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: http://127.0.0.1:8200
          method: approle
          roleId: ${{ steps.setup.outputs.role-id }}
          secretId: ${{ steps.setup.outputs.secret-id }}
          exportEnv: false
          secrets: |
            secret/data/osac/e2e/pull-secret dockerconfigjson | PULL_SECRET ;
            secret/data/osac/e2e/aap-license license | AAP_LICENSE

      - name: Write pull secret and AAP license to temp files
        shell: bash
        env:
          PULL_SECRET: ${{ steps.vault-secrets.outputs.PULL_SECRET }}
          AAP_LICENSE: ${{ steps.vault-secrets.outputs.AAP_LICENSE }}
        run: |
          printf '%s' "${PULL_SECRET}" > "$RUNNER_TEMP/pull-secret.json"
          chmod 600 "$RUNNER_TEMP/pull-secret.json"
          printf '%s' "${AAP_LICENSE}" | base64 -d > "$RUNNER_TEMP/aap-license.zip"
          chmod 600 "$RUNNER_TEMP/aap-license.zip"

      - name: Fetch Netris license
        id: netris-license
        uses: ./.github/actions/fetch-netris-license
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch CaaS Route 53 credentials
        id: route53-creds
        uses: ./.github/actions/fetch-caas-route53-creds
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Push CaaS/Netris secrets to ephemeral box
        shell: bash
        env:
          SSH_USER: ${{ needs.provision.outputs.ssh-user }}
          PUBLIC_IP: ${{ needs.provision.outputs.public-ip }}
          NETRIS_LICENSE: ${{ steps.netris-license.outputs.NETRIS_LICENSE }}
          ROUTE53_AWS_ACCESS_KEY_ID: ${{ steps.route53-creds.outputs.ROUTE53_AWS_ACCESS_KEY_ID }}
          ROUTE53_AWS_SECRET_ACCESS_KEY: ${{ steps.route53-creds.outputs.ROUTE53_AWS_SECRET_ACCESS_KEY }}
          AAP_LICENSE_ZIP_PATH: ${{ runner.temp }}/aap-license.zip
          PULL_SECRET_JSON_PATH: ${{ runner.temp }}/pull-secret.json
          LAB_NAME: ci-${{ github.run_id }}
          AWS_REGION: ${{ inputs.aws-region }}
        run: |
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/push-caas-netris-secrets.sh

  test:
    needs: [provision, push-secrets]
    # 360m (6h): e2e-caas-full-install-ec2.yml's own reference point
    # (PR #232's mechanism on the shared fleet, no bootstrap needed there)
    # took ~1h4m; this adds a from-scratch bootstrap plus the Netris lab
    # deploy on top of that, an untested combination -- generous upper
    # bound, matching both existing CaaS workflows' own timeout.
    runs-on: ${{ needs.provision.outputs.runner-label }}
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      FLAVOR_LOCK: "/tmp/cluster-tool-flavor-${{ inputs.flavor-name }}.lock"
    outputs:
      result: ${{ steps.run-tests.outcome == 'success' && 'PASSED' || 'FAILED' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.test-infra-repository || github.repository }}
          ref: ${{ inputs.test-infra-ref || '' }}
          persist-credentials: false

      # Same character-whitelist + git-ref-format validation as
      # e2e-caas-netris.yml's own "Validate component image override
      # inputs" step, for the same reason (EXTRA_VARS survives several
      # layers of recursive make-expansion before reaching ansible-playbook
      # -- see that step's comment for the full exploit chain). Scoped to
      # just fulfillment-service-branch here, since that's the only
      # ansible-extra-var-style input this workflow exposes (everything
      # else routes through image-overrides/component-* instead, matching
      # e2e-caas-full-install-ec2.yml's own install mechanism).
      - name: Validate fulfillment-service-branch input
        shell: bash
        env:
          FULFILLMENT_SERVICE_BRANCH: ${{ inputs.fulfillment-service-branch }}
        run: |
          if [[ -n "${FULFILLMENT_SERVICE_BRANCH}" ]]; then
            if [[ ! "${FULFILLMENT_SERVICE_BRANCH}" =~ ^[A-Za-z0-9._/@-]+$ ]]; then
              echo "::error::fulfillment-service-branch contains characters outside a valid branch name (letters, digits, and ._/@- only): ${FULFILLMENT_SERVICE_BRANCH}"
              exit 1
            fi
            if ! git check-ref-format --branch "${FULFILLMENT_SERVICE_BRANCH}" >/dev/null 2>&1; then
              echo "::error::fulfillment-service-branch is not a valid git branch name: ${FULFILLMENT_SERVICE_BRANCH}"
              exit 1
            fi
          fi

      - name: Build Netris lab extra-vars
        id: extra-vars
        shell: bash
        env:
          FULFILLMENT_SERVICE_BRANCH: ${{ inputs.fulfillment-service-branch }}
          NAMESPACE: ${{ inputs.namespace }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # snapshot_osac_namespace is included here (not just passed to
          # install-operators/install-osac's own INSTALLER_NAMESPACE env
          # var) because caas_setup and osac_post_refresh (run later, via
          # configure-netris-hybrid and setup-suite) both key off this
          # ansible var directly, hardcoded to default "osac-e2e-ci" in
          # group_vars/all.yml -- without this, overriding the `namespace`
          # input away from its default would install OSAC into one
          # namespace while those two roles silently kept looking in
          # another.
          # caas_discovery_ocp_target_ip overrides caas_discovery's DNS
          # target for the api.*/apps.* hostnames it hands the discovery
          # agents (defaults to ocp_dnat_ip, a Netris-DNAT address that only
          # exists when netris_configure's control-plane VNet/DNAT block
          # runs -- which this hybrid flow deliberately skips, see
          # configure-netris-hybrid.yml). This control plane isn't
          # Netris-managed at all: cluster-tool's own haproxy already
          # reverse-proxies OCP API/ingress on every host interface,
          # including br-mgmt, so pointing agents at the host's fixed
          # br-mgmt address (netris-lab/group_vars/all.yml's
          # mgmt_bridge_ip, also hardcoded in osac_post_refresh) reaches
          # the same haproxy without needing a real DNAT rule.
          #
          # ocp_cluster_name/ocp_base_domain override caas_discovery's
          # dnsmasq wildcard, which otherwise defaults to
          # group_vars/all.yml's "ocp-sno"/"<lab_name>.<dns_hosted_zone>" --
          # correct for the old recert-based control plane (recert.sh.j2
          # renames the cluster to exactly those vars), but wrong here: the
          # cluster-tool clone is never renamed, so its real route domain is
          # "test-infra-cluster-<clone-name>.redhat.com" (see "Set clone
          # name" step's CLONE_NAME=c${RUN_ID: -7}-caas, and cluster-tool's
          # own kubeconfig hostname convention). Confirmed live in run
          # 29940857732: without this, mgmt-server's dnsmasq wildcard never
          # matched the agents' actual api./apps. lookups, so even with
          # br-mgmt reachable (see openvpn-route-fix.sh.j2's route fix),
          # discovery agents could never resolve the assisted-service/
          # assisted-image-service routes to register.
          CLONE_NAME="c${RUN_ID: -7}-caas"
          EXTRA_VARS=$(jq -cn --arg ns "${NAMESPACE}" --arg cn "test-infra-cluster-${CLONE_NAME}" \
            '{snapshot_osac_namespace: $ns, caas_discovery_ocp_target_ip: "192.168.16.254", ocp_cluster_name: $cn, ocp_base_domain: "redhat.com"}')
          if [[ -n "${FULFILLMENT_SERVICE_BRANCH}" ]]; then
            EXTRA_VARS=$(echo "${EXTRA_VARS}" | jq -c --arg v "${FULFILLMENT_SERVICE_BRANCH}" '. + {fulfillment_service_branch: $v}')
          fi
          echo "json=${EXTRA_VARS}" >> "$GITHUB_OUTPUT"

      - name: Stage CaaS/Netris secrets into place
        shell: bash
        env:
          NETRIS_DIR: infra/netris
        run: ./scripts/ec2-runner/stage-caas-netris-secrets.sh

      # This ephemeral box is never bootstrapped via machine-init.sh, so
      # cluster-tool, the Netris lab's SSH-key assumption, and haproxy's
      # base config don't exist here yet -- tooling-check-cmds (above,
      # before JIT registration) only installs packages; this step does
      # the stateful setup that needs multi-line logic. cluster-tool/
      # haproxy/oc pieces ported from e2e-caas-full-install-ec2.yml, which
      # already proved this exact bootstrap works on an identical never-
      # machine-init.sh'd EC2 box.
      - name: Bootstrap cluster-tool, Netris lab, and virtualization prerequisites
        shell: bash
        run: |
          set -euo pipefail

          echo "=== openssl-libs regression workaround ==="
          # ansible-galaxy's Galaxy-API client intermittently fails against
          # galaxy.ansible.com with "[ASN1: NOT_ENOUGH_DATA]" on this AMI's
          # openssl-libs-3.5.5-5.el9_8 (ansible/ansible#87251, python/
          # cpython#151504: OpenSSL 3.5.5-5's ASN.1 end-of-data hardening
          # breaks CPython's SSLContext.load_verify_locations(cadata=...),
          # which ansible-galaxy's HTTP client uses but curl/plain urllib's
          # default-context cert loading doesn't). Downgrading to the
          # previous point release fixes it -- confirmed live. This runs
          # here, in the test job, rather than in tooling-check-cmds's
          # pass/fail-only gate: a downgrade attempted before
          # tooling-check-cmds's own `dnf install` populates dnf's metadata
          # cache on a freshly-booted box silently no-ops (confirmed live:
          # `dnf downgrade` returned 0 but left the vulnerable version
          # installed) -- by this point in the job, that cache is warm.
          # Best-effort with explicit before/after verification (not
          # `|| true` alone) so a silent no-op is visible in job logs
          # instead of masquerading as success. Remove once the upstream
          # CPython fix lands and this AMI picks it up.
          if [[ "$(rpm -q --qf '%{VERSION}-%{RELEASE}' openssl-libs)" == "3.5.5-5.el9_8" ]]; then
            for attempt in 1 2 3; do
              dnf downgrade -y openssl-libs-3.5.5-4.el9_8 openssl-3.5.5-4.el9_8 openssl-fips-provider-3.5.5-4.el9_8 || true
              CURRENT="$(rpm -q --qf '%{VERSION}-%{RELEASE}' openssl-libs)"
              if [[ "${CURRENT}" != "3.5.5-5.el9_8" ]]; then
                echo "openssl-libs downgraded to ${CURRENT} (attempt ${attempt})"
                break
              fi
              echo "openssl-libs downgrade attempt ${attempt} did not take (still ${CURRENT}), retrying..."
              sleep 5
            done
            if [[ "$(rpm -q --qf '%{VERSION}-%{RELEASE}' openssl-libs)" == "3.5.5-5.el9_8" ]]; then
              echo "::warning::openssl-libs downgrade did not take after 3 attempts -- ansible-galaxy may hit the ASN1 TLS bug"
            fi
          else
            echo "openssl-libs already at $(rpm -q --qf '%{VERSION}-%{RELEASE}' openssl-libs), no downgrade needed"
          fi

          echo "=== cluster-tool ==="
          CLUSTER_TOOL_DIR=/opt/cluster-tool
          CLUSTER_TOOL_BIN=/usr/local/bin/cluster-tool
          CLUSTER_TOOL_DATA=/var/lib/cluster-tool
          if [[ ! -f "${CLUSTER_TOOL_BIN}" ]]; then
            git clone https://github.com/osac-project/cluster-tool.git "${CLUSTER_TOOL_DIR}"
            install -m 0755 "${CLUSTER_TOOL_DIR}/cluster-tool" "${CLUSTER_TOOL_BIN}"
          fi

          mkdir -p /root/.config/cluster-tool
          if [[ ! -f /root/.config/cluster-tool/config ]]; then
            echo "CLUSTER_TOOL_DATA=${CLUSTER_TOOL_DATA}" > /root/.config/cluster-tool/config
          fi
          mkdir -p "${CLUSTER_TOOL_DATA}"/{flavors,overlays,tmp,containers/storage}

          if [[ ! -f /root/.config/cluster-tool/cluster-tool.key ]]; then
            ssh-keygen -t ed25519 -f /root/.config/cluster-tool/cluster-tool.key -N '' -q
          fi
          if [[ ! -f /root/.config/cluster-tool/servers.json ]]; then
            echo '{"servers": {"local": {"host": "local"}}, "default": "local"}' \
              > /root/.config/cluster-tool/servers.json
          fi

          echo "=== cluster-tool client DNS setup ==="
          # A booted clone's kubeconfig references it by hostname
          # (api.test-infra-cluster-<id>.redhat.com, plus arbitrary
          # *.apps.<id>.redhat.com route hostnames created later by
          # caas_discovery/caas_setup/the test suite itself) -- resolvable
          # only from a client with cluster-tool's own DNS integration,
          # not from this box's default AWS-VPC-provided resolver.
          # Confirmed live: oc/ansible get_url calls fail with NXDOMAIN
          # without this. cluster-tool's own `setup client` command installs
          # dnsmasq and points NetworkManager at it (dns=dnsmasq), which
          # auto-registers each libvirt network's own DNS zone -- the
          # supported mechanism for exactly this, run once since this box
          # is single-use and destroyed after the job (no concern about
          # accumulating config across concurrent/future clones, unlike a
          # shared persistent box).
          if [[ ! -f /etc/NetworkManager/conf.d/cluster-tool-dns.conf ]]; then
            "${CLUSTER_TOOL_BIN}" setup client
          fi

          echo "=== SELinux port label for haproxy on 6443 ==="
          # This AMI runs SELinux enforcing (Rocky Linux) -- confirmed live
          # via ausearch -m avc: "denied { name_bind } for pid=<haproxy>
          # comm=\"haproxy\" src=6443 scontext=...:haproxy_t:s0
          # tcontext=...:unreserved_port_t:s0". haproxy_t is only allowed to
          # bind ports already labeled for it (443 already is, via
          # http_port_t's default port list -- confirmed via `semanage port
          # -l`); 6443 has no label at all, so it falls back to
          # unreserved_port_t, which haproxy_t can't bind under enforcing.
          # The debug box this branch was otherwise validated against
          # doesn't have this restriction (SELinux disabled/permissive
          # there), which is why this was never caught before a real EC2
          # dispatch. Idempotent: only adds the mapping if not already
          # present, so a persistent (non-ephemeral) box wouldn't error on
          # a second run.
          if ! semanage port -l | grep -qP '^http_port_t\s+tcp\s+.*\b6443\b'; then
            semanage port -a -t http_port_t -p tcp 6443
          fi

          echo "=== haproxy ==="
          # cluster-tool boot's "Configuring access" step shells out to
          # `cat /etc/haproxy/haproxy.cfg` and rewrites it to add per-clone
          # frontends/backends by string-replacing a "    default_backend
          # <key>-" marker inside each frontend -- it doesn't create the
          # base file itself. bind *:6443/443 listens on every host
          # interface, including br-mgmt, which is what lets anything
          # already on br-mgmt (Netris controller, agents, mgmt-server)
          # reach OCP API/ingress without the control plane being Netris-
          # managed itself.
          #
          # Checking -f (file exists) instead of grepping for content was
          # wrong: `dnf install haproxy` (tooling-check-cmds, before this
          # step ever runs) already drops RHEL's own stock example config
          # at this exact path, so -f was always true and this block never
          # actually wrote anything on a freshly-provisioned EC2 box.
          # Confirmed live: cluster-tool's own patch step's marker-replace
          # silently no-ops when a frontend/marker isn't present (Python
          # str.replace() on a missing substring is a no-op, not an error)
          # -- it still appended backend blocks unconditionally, but with no
          # matching frontends/binds at all, so nothing was listening on
          # 6443/443 ("connection refused").
          #
          # No frontend ingress-http/bind *:80 here (unlike this step's
          # first draft): infra/netris/roles/lab_deploy's connectivity role
          # (deploy-infra, run earlier in this same job) unconditionally
          # binds its own socat forwarder to this exact host's default
          # IPv4:80 for Netris controller web-UI access -- confirmed live,
          # a `bind *:80` here collided with it and made haproxy's entire
          # config reload fail atomically (one frontend failing to bind
          # kills the whole process, not just that frontend), which is
          # *why* 6443/443 didn't work either despite not being
          # individually conflicted. Nothing in this pipeline needs plain-
          # HTTP OCP ingress (only the API on 6443 and HTTPS routes on 443
          # are ever used), so dropping it entirely -- rather than picking
          # a different bind target -- avoids the conflict outright.
          # cluster-tool's own patch step tolerates a missing ingress-http
          # frontend the same no-op way described above.
          if ! grep -q "^frontend api$" /etc/haproxy/haproxy.cfg 2>/dev/null; then
            # dnf install haproxy's own post-install scriptlet may have
            # already started the service against the stock config it just
            # shipped -- `systemctl enable --now` on an already-active unit
            # is a no-op (doesn't reload), so stop it first to guarantee a
            # clean start against the config written below regardless of
            # whatever state the package left it in.
            systemctl stop haproxy 2>/dev/null || true
            cat > /etc/haproxy/haproxy.cfg <<'HAPROXY_EOF'
          global
              log         127.0.0.1 local2
              chroot      /var/lib/haproxy
              pidfile     /var/run/haproxy.pid
              maxconn     4000
              user        haproxy
              group       haproxy
              daemon
              stats socket /var/lib/haproxy/stats

          defaults
              mode                    tcp
              log                     global
              option                  tcplog
              option                  dontlognull
              retries                 3
              timeout connect         10s
              timeout client          1m
              timeout server          1m
              maxconn                 3000

          frontend api
              bind *:6443
              tcp-request inspect-delay 5s
              tcp-request content accept if { req_ssl_hello_type 1 }
              default_backend api-fallback

          backend api-fallback
              server fallback 127.0.0.1:1 check

          frontend ingress-https
              bind *:443
              tcp-request inspect-delay 5s
              tcp-request content accept if { req_ssl_hello_type 1 }
              default_backend ingress-https-fallback

          backend ingress-https-fallback
              server fallback 127.0.0.1:1 check
          HAPROXY_EOF
          fi
          if ! systemctl enable --now haproxy; then
            echo "::group::haproxy failed to start -- diagnostics"
            cat /etc/haproxy/haproxy.cfg
            echo "--- haproxy -c ---"
            haproxy -c -f /etc/haproxy/haproxy.cfg || true
            echo "--- journalctl -xeu haproxy ---"
            journalctl -xeu haproxy --no-pager -n 60 || true
            echo "::endgroup::"
            exit 1
          fi

          echo "=== oc CLI ==="
          if ! command -v oc &>/dev/null; then
            TMP_OC=$(mktemp -d)
            curl -sL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz" \
              | tar xz -C "${TMP_OC}"
            install -m 0755 "${TMP_OC}/oc" /usr/local/bin/oc
            install -m 0755 "${TMP_OC}/kubectl" /usr/local/bin/kubectl 2>/dev/null || true
            rm -rf "${TMP_OC}"
          fi
          oc version --client

          echo "=== Netris lab SSH keypair ==="
          # infra/netris/roles/caas_discovery and osac_post_refresh both
          # read a real host-level SSH keypair at ssh_public_key_path
          # (default /root/.ssh/id_rsa.pub) -- present already on the
          # shared osac-ci fleet via machine-init.sh, not on this box.
          if [[ ! -f /root/.ssh/id_rsa.pub ]]; then
            ssh-keygen -t rsa -b 4096 -f /root/.ssh/id_rsa -N '' -q
          fi

      # Not ./.github/actions/validate-and-bootstrap: its "Read AppRole
      # credentials" sub-step hard-fails when Vault trust isn't present,
      # which this ephemeral box never has -- secrets are pre-staged by
      # push-secrets on the trusted orchestrator instead. Only the
      # clone-name derivation is needed here, so inline just that
      # sub-step's logic.
      - name: Set clone name
        shell: bash
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          CLONE_NAME="c${RUN_ID: -7}-caas"
          echo "CLONE_NAME=${CLONE_NAME}" >> "$GITHUB_ENV"
          echo "Clone name: ${CLONE_NAME}"

      - name: Setup infra prerequisites (make setup-infra)
        shell: bash
        env:
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make setup-infra INFRA=netris SUITE=caas EXTRA_VARS="${EXTRA_VARS}"

      # setup-infra (roles/lab_setup) builds osac to $HOME/.local/bin, a
      # job-scoped, non-root path -- roles/caas_setup invokes bare
      # `osac ...` relying on PATH resolution, so every later step in this
      # job needs it explicitly on PATH. Same as e2e-caas-netris.yml.
      - name: Add job-scoped osac CLI to PATH
        shell: bash
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Deploys the real Netris controller/BGP-fabric/softgate simulation
      # plus the h00-h03 rack VMs -- unchanged from e2e-caas-netris.yml.
      # h00 (normally the OCP control-plane target for
      # install-ocp.yml/restore-ocp-snapshot.yml) is deliberately never
      # installed onto in this flow -- it just sits unconfigured, since
      # the control plane below is a cluster-tool clone instead.
      - name: Deploy Netris lab (make deploy-infra)
        shell: bash
        env:
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make deploy-infra INFRA=netris SUITE=caas EXTRA_VARS="${EXTRA_VARS}"

      - name: Prepare cluster environment
        env:
          FLAVOR_IMAGE: ${{ inputs.flavor-image }}
          FLAVOR_NAME: ${{ inputs.flavor-name }}
        run: |
          DIGEST_FILE="/tmp/cluster-tool-flavor-${FLAVOR_NAME}.digest"
          REMOTE_DIGEST=$(skopeo inspect "docker://${FLAVOR_IMAGE}" --format '{{.Digest}}' 2>/dev/null || echo "")

          exec 9>"${FLAVOR_LOCK}"
          flock --exclusive 9
          echo "Acquired flavor lock."

          LOCAL_DIGEST=""
          if [[ -f "${DIGEST_FILE}" ]]; then
            LOCAL_DIGEST=$(cat "${DIGEST_FILE}")
          fi

          FLAVOR_EXISTS=false
          if /usr/local/bin/cluster-tool flavors 9>&- \
               | grep -q "^${FLAVOR_NAME} "; then
            FLAVOR_EXISTS=true
          fi

          NEED_PULL=false
          if ${FLAVOR_EXISTS}; then
            if [[ -n "${REMOTE_DIGEST}" ]] && [[ "${REMOTE_DIGEST}" == "${LOCAL_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' is up to date — skipping pull."
            elif [[ -n "${REMOTE_DIGEST}" ]] && [[ -z "${LOCAL_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' already present, seeding digest file."
              echo "${REMOTE_DIGEST}" > "${DIGEST_FILE}"
            elif [[ -n "${REMOTE_DIGEST}" ]]; then
              echo "Flavor '${FLAVOR_NAME}' image changed — deleting and re-pulling..."
              /usr/local/bin/cluster-tool flavors --delete "${FLAVOR_NAME}" 9>&- || true
              NEED_PULL=true
            else
              echo "Flavor '${FLAVOR_NAME}' already present, could not check remote digest — skipping pull."
            fi
          else
            echo "Flavor '${FLAVOR_NAME}' not found — pulling..."
            NEED_PULL=true
          fi

          if ${NEED_PULL}; then
            /usr/local/bin/cluster-tool pull "${FLAVOR_IMAGE}" 9>&-
            if [[ -n "${REMOTE_DIGEST}" ]]; then
              echo "${REMOTE_DIGEST}" > "${DIGEST_FILE}"
            fi
          fi

          exec 9>&-
          echo "Released flavor lock."

          /usr/local/bin/cluster-tool destroy "${CLONE_NAME}" 2>/dev/null || true
          BRIDGE_PREFIX="br-${CLONE_NAME:0:8}"
          for br in $(ip -o link show | grep -oP "${BRIDGE_PREFIX}[^ @]*"); do
            echo "Removing stale bridge ${br}..."
            ip link set "${br}" down 2>/dev/null || true
            ip link delete "${br}" 2>/dev/null || true
          done

      - name: Boot cluster clone
        env:
          FLAVOR_NAME: ${{ inputs.flavor-name }}
        run: |
          exec 9>"${FLAVOR_LOCK}"
          flock --shared 9
          /usr/local/bin/cluster-tool boot \
            --flavor "${FLAVOR_NAME}" --name "${CLONE_NAME}" \
            --pull-secret /root/pull-secret 9>&-
          exec 9>&-

          echo "Cluster clone '${CLONE_NAME}' booted."

          cp "${HOME}/.kube/${CLONE_NAME}.kubeconfig" "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"

      - name: Build and load component image
        if: inputs.component-repo != ''
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          COMPONENT_REPO: ${{ inputs.component-repo }}
          COMPONENT_REF: ${{ inputs.component-ref }}
          COMPONENT_FILE: ${{ inputs.component-containerfile }}
          COMPONENT_IMAGE_KEY: ${{ inputs.component-image-key }}
          COMPONENT_BUILD_TYPE: ${{ inputs.component-build-type }}
        run: |
          COMPONENT_TAG="localhost/component-pr:${GITHUB_RUN_ID}"

          echo "Cloning ${COMPONENT_REPO}@${COMPONENT_REF}..."
          git clone --depth 1 --branch "${COMPONENT_REF}" \
            "https://github.com/${COMPONENT_REPO}.git" "$RUNNER_TEMP/component-src"

          SRC="$RUNNER_TEMP/component-src"
          if [[ "${COMPONENT_BUILD_TYPE}" == "ansible-builder" ]]; then
            echo "Generating build context with ansible-builder from ${COMPONENT_FILE}..."
            python3 -m pip install --quiet ansible-builder
            ansible-builder create --file "${SRC}/${COMPONENT_FILE}" --context "${SRC}/context"
            podman build -t "${COMPONENT_TAG}" -f "${SRC}/context/Containerfile" "${SRC}/context"
          else
            echo "Building image from ${COMPONENT_FILE}..."
            podman build -t "${COMPONENT_TAG}" -f "${SRC}/${COMPONENT_FILE}" "${SRC}"
          fi

          if [[ "${COMPONENT_REPO}" == *"fulfillment-service"* ]]; then
            echo "Building osac CLI from source..."
            (cd "${SRC}" && CGO_ENABLED=0 go build -o "$RUNNER_TEMP/osac-cli-bin" ./cmd/osac)
            echo "OSAC_CLI_BIN=$RUNNER_TEMP/osac-cli-bin" >> "$GITHUB_ENV"
          fi

          NODE_NAME=$(oc get nodes -o jsonpath='{.items[0].metadata.name}')
          echo "Loading image onto node ${NODE_NAME}..."
          podman save "${COMPONENT_TAG}" | \
            oc debug "node/${NODE_NAME}" -t=false -- \
              chroot /host podman load

          echo "COMPONENT_IMAGE=${COMPONENT_TAG}" >> "$GITHUB_ENV"
          echo "COMPONENT_REPO_NAME=${COMPONENT_REPO}" >> "$GITHUB_ENV"
          echo "COMPONENT_REF_NAME=${COMPONENT_REF}" >> "$GITHUB_ENV"

      - name: Build test image
        env:
          E2E_IMAGE: "osac-e2e-tests:${{ github.run_id }}"
          OSAC_VERSION: ${{ inputs.osac-cli-version }}
        run: |
          BUILD_ARGS="--build-arg OSAC_VERSION=${OSAC_VERSION}"
          if [[ -n "${OSAC_CLI_BIN:-}" ]] && [[ -f "${OSAC_CLI_BIN}" ]]; then
            cp "${OSAC_CLI_BIN}" ./osac-cli-bin
            BUILD_ARGS="--build-arg OSAC_CLI_BIN=osac-cli-bin"
          fi
          podman build --no-cache ${BUILD_ARGS} -t "${E2E_IMAGE}" -f Containerfile .
          rm -f ./osac-cli-bin

      - name: Prepare cluster prerequisites
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
        run: |
          echo "Waiting for CatalogSource redhat-operators to be READY..."
          oc wait --for=jsonpath='{.status.connectionState.lastObservedState}'=READY \
            catalogsource/redhat-operators -n openshift-marketplace --timeout=300s

          echo "Patching OVN masquerade subnet to 169.254.0.0/17..."
          oc patch networks.operator.openshift.io cluster --type=merge \
            -p '{"spec":{"defaultNetwork":{"ovnKubernetesConfig":{"gatewayConfig":{"ipv4":{"internalMasqueradeSubnet":"169.254.0.0/17"}}}}}}'
          oc delete pod -n openshift-network-operator -l name=network-operator
          echo "Waiting 180s for OVN to stabilize..."
          sleep 180
          oc rollout status ds/ovnkube-node -n openshift-ovn-kubernetes --timeout=300s

          echo "Applying KubeletConfig (maxPods: 500)..."
          cat <<'KUBELET_EOF' | oc apply -f -
          apiVersion: machineconfiguration.openshift.io/v1
          kind: KubeletConfig
          metadata:
            name: set-master-max-pods
          spec:
            machineConfigPoolSelector:
              matchLabels:
                pools.operator.machineconfiguration.openshift.io/master: ""
            kubeletConfig:
              maxPods: 500
          KUBELET_EOF
          echo "Waiting for MCP master to finish updating (node will reboot on SNO)..."
          oc wait --for=condition=Updated mcp/master --timeout=600s
          echo "Waiting 180s for MCP to settle..."
          sleep 180

      - name: Install infrastructure operators
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          INSTALLER_NAMESPACE: ${{ inputs.namespace }}
          # `|| 'default'` here, not just this workflow_call input's own
          # `default:` -- the caller passes installer-ref/installer-repo
          # through as `${{ inputs.installer-ref || '' }}` (empty string
          # when the dispatch-time input is unset), and workflow_call
          # input defaults only apply when the caller omits the key
          # entirely, not when it's explicitly set to "". Confirmed live:
          # without this, INSTALLER_REPO ends up "" and `git clone
          # https://github.com/${INSTALLER_REPO}.git` fails with "fatal:
          # repository 'https://github.com/.git/' not found".
          INSTALLER_REF: ${{ inputs.installer-ref || 'main' }}
          INSTALLER_REPO: ${{ inputs.installer-repo || 'osac-project/osac-installer' }}
        run: |
          if ! command -v helm &>/dev/null; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          if ! command -v yq &>/dev/null; then
            YQ_VERSION="v4.53.3"
            YQ_SHA256="fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4"
            YQ_DIR="${RUNNER_TEMP}/bin"
            mkdir -p "${YQ_DIR}"
            curl -fsSL -o "${YQ_DIR}/yq" \
              "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
            echo "${YQ_SHA256}  ${YQ_DIR}/yq" | sha256sum -c -
            chmod +x "${YQ_DIR}/yq"
            export PATH="${YQ_DIR}:${PATH}"
            echo "${YQ_DIR}" >> "$GITHUB_PATH"
          fi

          INSTALLER_DIR="$RUNNER_TEMP/osac-installer"
          git clone --recurse-submodules --depth 1 --branch "${INSTALLER_REF}" \
            "https://github.com/${INSTALLER_REPO}.git" "${INSTALLER_DIR}"
          cd "${INSTALLER_DIR}"

          bash "${GITHUB_WORKSPACE}/.github/scripts/replace-installer-submodule.sh" \
            "${INSTALLER_DIR}" "$RUNNER_TEMP/component-src"

          make install-operators VALUES_FILE=values/caas-ci/values.yaml
          make install-prereqs VALUES_FILE=values/caas-ci/values.yaml

      - name: Install OSAC
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
          INSTALLER_NAMESPACE: ${{ inputs.namespace }}
          IMAGE_OVERRIDES: ${{ inputs.image-overrides }}
          COMPONENT_IMAGE_KEY: ${{ inputs.component-image-key }}
        run: |
          INSTALLER_DIR="$RUNNER_TEMP/osac-installer"
          cd "${INSTALLER_DIR}"

          # osac-installer's own install-secrets target (a dependency of
          # install-osac) expects the AAP license at
          # values/<values-dir>/license.zip -- a different path than where
          # stage-caas-netris-secrets.sh puts it (infra/netris/license.zip,
          # for that script's own golden-snapshot/osac_refresh consumer).
          # Confirmed live: without this, install-osac fails immediately
          # with "ERROR: AAP license not found at values/caas-ci/license.zip".
          cp "${GITHUB_WORKSPACE}/infra/netris/license.zip" values/caas-ci/license.zip

          make install-osac VALUES_FILE=values/caas-ci/values.yaml

          MERGED_OVERRIDES="${IMAGE_OVERRIDES}"
          if [[ -n "${COMPONENT_IMAGE:-}" ]] && [[ -n "${COMPONENT_IMAGE_KEY}" ]]; then
            if [[ "${COMPONENT_IMAGE_KEY}" == *.repository ]]; then
              IMG_REPO="${COMPONENT_IMAGE%%:*}"
              IMG_TAG="${COMPONENT_IMAGE#*:}"
              TAG_KEY="${COMPONENT_IMAGE_KEY%.repository}.tag"
              PULL_KEY="${COMPONENT_IMAGE_KEY%.repository}.pullPolicy"
              MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
                jq -c --arg rk "${COMPONENT_IMAGE_KEY}" --arg rv "${IMG_REPO}" \
                      --arg tk "${TAG_KEY}" --arg tv "${IMG_TAG}" \
                      --arg pk "${PULL_KEY}" --arg pv "IfNotPresent" \
                      '. + {($rk): $rv, ($tk): $tv, ($pk): $pv}')
            else
              MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
                jq -c --arg k "${COMPONENT_IMAGE_KEY}" --arg v "${COMPONENT_IMAGE}" '. + {($k): $v}')
            fi
          fi

          if [[ "${COMPONENT_IMAGE_KEY}" == "aap.bootstrap.image" && -n "${COMPONENT_REF_NAME:-}" ]]; then
            AAP_GIT_URI="https://github.com/${COMPONENT_REPO_NAME}"
            MERGED_OVERRIDES=$(echo "${MERGED_OVERRIDES}" | \
              jq -c --arg bk "aap.configAsCode.projectGitBranch" --arg bv "${COMPONENT_REF_NAME}" \
                    --arg uk "aap.configAsCode.projectGitUri" --arg uv "${AAP_GIT_URI}" \
                    '. + {($bk): $bv, ($uk): $uv}')
          fi

          if [[ -n "${MERGED_OVERRIDES}" ]] && [[ "${MERGED_OVERRIDES}" != "{}" ]]; then
            echo "Applying image overrides..."
            SET_ARGS=()
            for key in $(echo "${MERGED_OVERRIDES}" | jq -r 'keys[]'); do
              value=$(echo "${MERGED_OVERRIDES}" | jq -r --arg k "${key}" '.[$k]')
              SET_ARGS+=("--set-string" "${key}=${value}")
              echo "  --set-string ${key}=${value}"
            done

            yq -i '(.dependencies[].version) = "0.0.0"' charts/osac/Chart.yaml
            helm dependency update charts/osac/
            helm upgrade osac charts/osac/ \
              --namespace "${INSTALLER_NAMESPACE}" \
              --reuse-values \
              --no-hooks \
              "${SET_ARGS[@]}" \
              --timeout 10m \
              --wait
          fi

      # infra/netris/roles/caas_discovery, caas_setup, and
      # configure-netris-hybrid (netris_configure + osac_post_refresh) all
      # hardcode KUBECONFIG: /root/.kube/config -- simplest fix is to put
      # the cluster-tool clone's kubeconfig there, rather than
      # parameterizing every task in three roles.
      - name: Stage kubeconfig for Netris wiring
        run: |
          mkdir -p /root/.kube
          cp "$RUNNER_TEMP/kubeconfig" /root/.kube/config
          chmod 600 /root/.kube/config

      # The genuinely new piece: registers Netris VPC/IPAM + the ns-only
      # worker-fabric server-cluster-template (needed regardless of control-
      # plane placement), then patches cluster-fulfillment-ig with this
      # lab's real NETRIS_CONTROLLER_URL/DNS/SSH config -- the same pattern
      # e2e-caas-netris.yml's post-snapshot-refresh step uses, minus the
      # ingress-forwarder (haproxy, above, already covers that) and minus
      # placing the control plane inside a Netris VPC (it isn't Netris-
      # managed at all). See configure-netris-hybrid.yml and the
      # netris_configure/osac_post_refresh/caas_discovery changes in this
      # branch for the full mechanism.
      - name: Configure Netris networking for hybrid control plane
        shell: bash
        env:
          LAB_NAME: ci-${{ github.run_id }}
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make -C infra/netris -f contract.mk configure-netris-hybrid EXTRA_VARS="${EXTRA_VARS}"

      # caas_discovery + caas_setup: boots h01-h03 with the real assisted-
      # installer discovery ISO, registers them as Agent CRs, labels/
      # approves them, and registers the ci-worker host type + cluster
      # catalog item with the fulfillment service -- unchanged from
      # e2e-caas-netris.yml, now targeting the cluster-tool clone's
      # kubeconfig (staged above) instead of a Netris-managed control plane.
      - name: Setup CaaS suite (make setup-suite)
        shell: bash
        env:
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make setup-suite INFRA=netris SUITE=caas EXTRA_VARS="${EXTRA_VARS}"

      - name: Run CaaS e2e tests
        id: run-tests
        timeout-minutes: 120
        shell: bash
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
          E2E_IMAGE: "osac-e2e-tests:${{ github.run_id }}"
          OSAC_NAMESPACE: ${{ inputs.namespace }}
          # Not an overridable input: caas_setup registers the fulfillment-
          # side catalog item under group_vars/all.yml's own
          # caas_cluster_template ("osac.templates.ocp_ci_small") -- an
          # override here without also touching that group_var would just
          # make the test look for a catalog item that was never
          # registered. Matches e2e-caas-netris.yml's own precedent (no
          # override capability at all).
          OSAC_CLUSTER_TEMPLATE: "osac.templates.ocp_ci_small"
        run: |
          FILTER_ARGS=""
          if [ -n "${TEST_FILTER}" ]; then
            FILTER_ARGS="-k ${TEST_FILTER}"
          fi

          mkdir -p "$RUNNER_TEMP/test-output"
          podman run --rm --network=host \
            -v "$RUNNER_TEMP/kubeconfig":/root/.kube/config:ro,Z \
            -v /root/pull-secret:/root/pull-secret:ro,Z \
            -v /root/.ssh/id_rsa.pub:/root/.ssh/id_rsa.pub:ro,Z \
            -v "$RUNNER_TEMP/test-output":/tmp/test-output:Z \
            -e KUBECONFIG=/root/.kube/config \
            -e OSAC_VM_KUBECONFIG=/root/.kube/config \
            -e OSAC_NAMESPACE="${OSAC_NAMESPACE}" \
            -e OSAC_CLUSTER_TEMPLATE="${OSAC_CLUSTER_TEMPLATE}" \
            -e OSAC_PULL_SECRET_PATH=/root/pull-secret \
            -e PYTHONUNBUFFERED=1 \
            "${E2E_IMAGE}" \
            pytest tests/caas/ -n0 ${FILTER_ARGS} --junitxml=/tmp/test-output/junit.xml -v

      - name: Gather artifacts
        if: always()
        uses: ./.github/actions/gather-artifacts
        with:
          namespace: ${{ inputs.namespace }}
          kubeconfig-path: ${{ runner.temp }}/kubeconfig
          artifact-name: osac-logs-caas-netris-full-install-${{ github.run_id }}
          junit-path: ${{ runner.temp }}/test-output/junit.xml

      - name: Gather infra diagnostics
        if: always()
        shell: bash
        continue-on-error: true
        run: make gather-infra INFRA=netris

      - name: Gather CaaS diagnostics
        if: always()
        shell: bash
        continue-on-error: true
        run: make gather-suite INFRA=netris SUITE=caas

      - name: Upload CaaS/Netris test artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: caas-netris-full-install-artifacts
          path: |
            ${{ runner.temp }}/test-output/junit.xml
            infra/netris/logs/
          if-no-files-found: ignore

      - name: Cleanup Route 53 DNS records
        if: always()
        shell: bash
        continue-on-error: true
        run: make -C infra/netris -f contract.mk cleanup-dns

      - name: Gather EC2 runner artifacts
        if: always()
        uses: ./.github/actions/gather-ec2-runner-artifacts

      - name: Notify Slack on failure
        if: always() && failure() && inputs.notify-on-failure
        uses: ./.github/actions/notify-slack
        with:
          status: failure
          workflow-name: "E2E CaaS Netris Full Install"
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch-name: ${{ github.ref_name }}
          commit-sha: ${{ github.sha }}
          artifact-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts

  teardown:
    needs: [provision, push-secrets, test]
    if: always()
    uses: ./.github/workflows/ec2-runner-teardown.yml
    permissions:
      contents: read
    with:
      instance-id: ${{ needs.provision.outputs.instance-id }}
      runner-id: ${{ needs.provision.outputs.runner-id }}
      orchestrator-runner-label: ${{ inputs.orchestrator-runner-label }}
      aws-region: ${{ inputs.aws-region }}
