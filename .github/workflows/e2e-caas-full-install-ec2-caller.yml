---
name: E2E CaaS Full Install (EC2)

permissions:
  contents: read

# workflow_dispatch only for now -- no schedule yet, unlike
# e2e-caas-netris-caller.yml (which only added its own schedule once this
# mechanism was proven in real dispatches). Add a schedule here once this
# has a track record of passing reliably.
#
# AMI id, subnet id, and security group id are NOT dispatch inputs: this
# repo is public, and workflow_dispatch inputs are visible forever in the
# Actions run history/API to anyone. The reusable workflow fetches them from
# Vault instead (see .github/actions/fetch-ec2-runner-network-config).
on:
  workflow_dispatch:
    inputs:
      instance-type:
        description: "EC2 instance type -- curated allow-list, not free text, so a dispatch (available to anyone with write access) can't accidentally launch an unexpectedly expensive type. Add to `options` deliberately."
        required: false
        type: choice
        options:
          - "c5n.metal"
        default: "c5n.metal"
      aws-region:
        description: "AWS region to launch into"
        required: false
        default: "us-east-1"
      tooling-check-cmds:
        description: "Semicolon-separated commands to verify on the box before JIT registration. Defaults to installing this flow's prerequisites (libvirt/qemu-kvm/virt-install/podman/skopeo/zstd/pigz/jq/haproxy/git) -- override here to smoke-test against a stock AMI (e.g. 'true') or to check for something else, without editing the workflow file."
        required: false
        default: "dnf install -y libvirt qemu-kvm virt-install podman skopeo zstd pigz jq haproxy git; systemctl enable --now libvirtd; command -v virt-install"
      test-filter:
        description: "pytest -k filter expression (optional)"
        required: false
        default: ""
      image-overrides:
        description: "JSON object mapping Helm value paths to image refs, e.g. '{\"service.images.service\":\"ghcr.io/osac-project/fulfillment-service:pr-123\"}'"
        required: false
        default: "{}"
      installer-repo:
        description: "Override osac-installer git URI (e.g. a personal fork, to test a PR pre-merge) -- empty means the upstream repo. Not sensitive: a public repo URL."
        required: false
        default: ""
      installer-ref:
        description: "Branch, tag, or commit of osac-installer to clone -- empty means main."
        required: false
        default: ""

jobs:
  e2e-caas-full-install-ec2:
    uses: ./.github/workflows/e2e-caas-full-install-ec2.yml
    with:
      instance-type: ${{ inputs.instance-type || 'c5n.metal' }}
      aws-region: ${{ inputs.aws-region || 'us-east-1' }}
      tooling-check-cmds: ${{ inputs.tooling-check-cmds || 'dnf install -y libvirt qemu-kvm virt-install podman skopeo zstd pigz jq haproxy git; systemctl enable --now libvirtd; command -v virt-install' }}
      test-filter: ${{ inputs.test-filter || '' }}
      image-overrides: ${{ inputs.image-overrides || '{}' }}
      installer-repo: ${{ inputs.installer-repo || '' }}
      installer-ref: ${{ inputs.installer-ref || '' }}
