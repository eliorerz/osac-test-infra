---
name: E2E CaaS Full Install (EC2)

permissions:
  contents: read

# SKELETON: this file exists on main only so the workflow_dispatch trigger
# is registered (GitHub requires a workflow_dispatch workflow to exist on
# the default branch before it becomes dispatchable at all, even to run a
# different ref's content). The real implementation -- this caller plus
# the reusable e2e-caas-full-install-ec2.yml it calls -- lives on the
# caas-full-install-ec2 branch and is dispatched via
# `gh workflow run e2e-caas-full-install-ec2-caller.yml --ref
# caas-full-install-ec2`, which runs the FULL workflow definition from that
# ref (including this same file's real body), not this placeholder. This
# skeleton will be replaced by that branch's real content once it's proven
# via real dispatches and merged as its own PR.
#
# workflow_dispatch only for now -- no schedule yet, unlike
# e2e-caas-netris-caller.yml (which only added its own schedule once that
# mechanism was proven in real dispatches).
on:
  workflow_dispatch:
    inputs:
      instance-type:
        description: "EC2 instance type -- curated allow-list, not free text, so a dispatch (available to anyone with write access) can't accidentally launch an unexpectedly expensive type. Add to `options` deliberately."
        required: false
        type: choice
        options:
          - "c5n.metal"
        default: "c5n.metal"
      aws-region:
        description: "AWS region to launch into"
        required: false
        default: "us-east-1"
      tooling-check-cmds:
        description: "Semicolon-separated commands to verify on the box before JIT registration. Defaults to installing this flow's prerequisites (libvirt/qemu-kvm/virt-install/podman/skopeo/zstd/pigz/jq/haproxy/git) -- override here to smoke-test against a stock AMI (e.g. 'true') or to check for something else, without editing the workflow file."
        required: false
        default: "dnf install -y libvirt qemu-kvm virt-install podman skopeo zstd pigz jq haproxy git; systemctl enable --now libvirtd; command -v virt-install"
      test-filter:
        description: "pytest -k filter expression (optional)"
        required: false
        default: ""
      image-overrides:
        description: "JSON object mapping Helm value paths to image refs, e.g. '{\"service.images.service\":\"ghcr.io/osac-project/fulfillment-service:pr-123\"}'"
        required: false
        default: "{}"
      installer-repo:
        description: "Override osac-installer git URI (e.g. a personal fork, to test a PR pre-merge) -- empty means the upstream repo. Not sensitive: a public repo URL."
        required: false
        default: ""
      installer-ref:
        description: "Branch, tag, or commit of osac-installer to clone -- empty means main."
        required: false
        default: ""

jobs:
  skeleton:
    runs-on: ubuntu-latest
    steps:
      - name: Explain this placeholder
        run: |
          echo "This is a registration skeleton for e2e-caas-full-install-ec2-caller.yml."
          echo "Dispatch with --ref caas-full-install-ec2 to run the real implementation."
          exit 1
