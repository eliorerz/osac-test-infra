---
name: Validate monitoring stack

# Config/rules/dashboard sanity checks for every PR touching monitoring/**.
# No secrets needed, runs on GitHub-hosted ubuntu-latest. Split out from
# deploy-monitoring.yml (OSAC-2204) so the deploy job -- which only ever
# runs on push to main or workflow_dispatch -- never appears (even as
# "skipped") in a PR's checks list; GitHub Actions triggers are per-file,
# not per-job.
on:
  pull_request:
    paths: ["monitoring/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Pinned to the exact version prometheus.container deploys
      # (monitoring/quadlet/prometheus.container) -- :latest would make
      # this check non-reproducible and could pass/fail independently of
      # any real config change whenever upstream cuts a new release.
      - name: promtool check config
        run: |
          # Mounted at /etc/prometheus (not an arbitrary path) to match
          # prometheus.yml's own `rule_files: - /etc/prometheus/alert-rules.yml`
          # reference -- otherwise promtool can't resolve it and fails.
          # --entrypoint promtool is required: prom/prometheus's default
          # entrypoint is the prometheus server binary, not promtool.
          docker run --rm --entrypoint promtool \
            -v "$PWD/monitoring/config:/etc/prometheus:ro" \
            prom/prometheus:v3.4.1 \
            check config /etc/prometheus/prometheus.yml

      - name: promtool check rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "$PWD/monitoring/config:/etc/prometheus:ro" \
            prom/prometheus:v3.4.1 \
            check rules /etc/prometheus/alert-rules.yml

      - name: Validate Grafana dashboard JSON
        run: |
          set -euo pipefail
          for f in monitoring/config/grafana/dashboards/*.json; do
            echo "Checking ${f}"
            jq empty "${f}"
          done
