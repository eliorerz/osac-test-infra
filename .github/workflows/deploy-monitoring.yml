---
name: Deploy monitoring stack

# validate: every PR touching monitoring/** -- config/rules/dashboard sanity
# checks, no secrets, runs on GitHub-hosted ubuntu-latest.
#
# deploy: on merge to main (or manual re-run), refreshes the live stack on
# osac-ci-1 and fans out to every registered remote runner. Runs on the
# dedicated monitoring-central self-hosted runner (OSAC-2204) -- must be
# osac-ci-1 itself, since monitoring-setup.sh --update-central operates on
# the local filesystem/systemd/podman there directly.
on:
  pull_request:
    paths: ["monitoring/**"]
  push:
    branches: [main]
    paths: ["monitoring/**"]
  workflow_dispatch: {}

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: promtool check config
        run: |
          docker run --rm -v "$PWD/monitoring/config:/config:ro" \
            prom/prometheus:latest \
            promtool check config /config/prometheus.yml

      - name: promtool check rules
        run: |
          docker run --rm -v "$PWD/monitoring/config:/config:ro" \
            prom/prometheus:latest \
            promtool check rules /config/alert-rules.yml

      - name: Validate Grafana dashboard JSON
        run: |
          set -euo pipefail
          for f in monitoring/config/grafana/dashboards/*.json; do
            echo "Checking ${f}"
            jq empty "${f}"
          done

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: monitoring-central
    environment: monitoring
    permissions:
      contents: read
    concurrency:
      group: deploy-monitoring
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # --- Secret bootstrap (same pattern as e2e-vmaas.yml) ---
      - name: Read AppRole credentials
        id: approle
        run: |
          APPROLE_DIR="${HOME}/.vault-server/.approle"
          echo "role-id=$(cat "${APPROLE_DIR}/role-id")" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(cat "${APPROLE_DIR}/secret-id")"
          echo "secret-id=$(cat "${APPROLE_DIR}/secret-id")" >> "$GITHUB_OUTPUT"

      - name: Retrieve secrets from Vault
        id: vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: http://127.0.0.1:8200
          method: approle
          roleId: ${{ steps.approle.outputs.role-id }}
          secretId: ${{ steps.approle.outputs.secret-id }}
          exportEnv: false
          secrets: |
            secret/data/osac/monitoring/github-token token | PRIVATE_GITHUB_TOKEN

      - name: Write .env
        env:
          PRIVATE_GITHUB_TOKEN: ${{ steps.vault.outputs.PRIVATE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ENV_FILE="${HOME}/.monitoring-server/.env"
          mkdir -p "$(dirname "${ENV_FILE}")"
          echo "PRIVATE_GITHUB_TOKEN=${PRIVATE_GITHUB_TOKEN}" > "${ENV_FILE}"
          chmod 600 "${ENV_FILE}"

      - name: Update central stack
        run: bash monitoring/scripts/monitoring-setup.sh --update-central

      - name: Update remote agents
        run: |
          set -euo pipefail
          REGISTRY="${HOME}/.monitoring-server/config/remote-runners.txt"
          KEY="${HOME}/.monitoring-server/.ssh/monitoring_ed25519"
          SYNC_DIR="${HOME}/.monitoring-server-repo-sync"

          if [[ ! -s "${REGISTRY}" ]]; then
            echo "No remote runners registered -- nothing to fan out to."
            exit 0
          fi

          while read -r label host _port; do
            [[ -z "${label}" ]] && continue
            echo "=== Updating ${label} (${host}) ==="

            # Sync the checked-out monitoring/ subtree fresh each deploy --
            # remote hosts don't keep their own repo checkout (see the
            # OSAC-2204 doc note: no host had one until this workflow),
            # and MONITORING_REPO_DIR is explicitly overridden below so
            # the deployed script's own relative-path resolution never
            # comes into play.
            rsync -az --delete -e "ssh -i ${KEY} -o StrictHostKeyChecking=yes -o ConnectTimeout=10" \
              monitoring/ "github-runner@${host}:${SYNC_DIR}/monitoring/"

            ssh -i "${KEY}" -o StrictHostKeyChecking=yes -o ConnectTimeout=10 "github-runner@${host}" \
              "MONITORING_REPO_DIR=${SYNC_DIR}/monitoring bash ${SYNC_DIR}/monitoring/scripts/monitoring-setup.sh --update-agent"
          done < "${REGISTRY}"

      - name: Post-deploy health check
        run: bash monitoring/scripts/monitoring-health-check.sh
