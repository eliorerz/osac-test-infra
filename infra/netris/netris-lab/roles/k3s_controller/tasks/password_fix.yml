---
# Fresh Netris installs have salt="true" which triggers mandatory password change.
# Fix by setting a proper bcrypt salt+hash in MariaDB.
- name: Get MariaDB root password
  shell: |
    kubectl get secret -n netris-controller netris-controller-mariadb \
      -o jsonpath='{.data.mariadb-root-password}' | base64 -d
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: mariadb_password
  changed_when: false

- name: Check if password fix is needed
  shell: |
    kubectl exec -n netris-controller netris-controller-mariadb-0 -- \
      mysql -u root -p{{ mariadb_password.stdout }} netris -N \
      -e "SELECT salt FROM users WHERE id=1"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: current_salt
  changed_when: false
  retries: 10
  delay: 10
  until: current_salt.rc == 0

- name: Generate bcrypt hash for password
  when: current_salt.stdout == "true"
  shell: |
    python3 -c "
    import bcrypt
    password = '{{ netris_password }}'.encode('utf-8')
    salt = bcrypt.gensalt(rounds=10)
    hashed = bcrypt.hashpw(password, salt)
    print(salt.decode('utf-8'))
    print(hashed.decode('utf-8'))
    "
  register: bcrypt_output

- name: Update MariaDB password and salt
  when: current_salt.stdout == "true"
  shell: |
    SALT='{{ bcrypt_output.stdout_lines[0] }}'
    HASH='{{ bcrypt_output.stdout_lines[1] }}'
    kubectl exec -n netris-controller netris-controller-mariadb-0 -- \
      mysql -u root -p{{ mariadb_password.stdout }} netris \
      -e "UPDATE users SET salt='$SALT', password='$HASH' WHERE id=1;"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
