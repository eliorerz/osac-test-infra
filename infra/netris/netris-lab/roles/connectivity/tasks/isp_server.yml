---
# In isolated mode, the host acts as the br-public gateway.
# Add the gateway IP so the ISP server's default route works,
# then ensure FRR is installed and running.

- name: Add gateway IP on br-public
  shell: ip addr add {{ bgp_link_subnet | ansible.utils.ipaddr('network') | ansible.utils.ipmath(1) }}/{{ bgp_link_subnet | ansible.utils.ipaddr('prefix') }} dev {{ public_bridge_name }} 2>/dev/null || true
  changed_when: false

- name: Route NAT and L4LB pools via ISP server
  command: ip route replace {{ item }} via {{ bgp_link_subnet | ansible.utils.ipaddr('network') | ansible.utils.ipmath(2) }} dev {{ public_bridge_name }}
  loop:
    - "{{ nat_cidr }}"
    - "{{ l4lb_cidr }}"
  changed_when: true

- name: Wait for ISP server SSH
  wait_for:
    host: 192.168.122.15
    port: 22
    timeout: 300
    sleep: 10

- name: Remove stale SSH host key for ISP server
  shell: ssh-keygen -R 192.168.122.15 2>/dev/null || true
  changed_when: false

- name: Check if FRR is running
  shell: ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@192.168.122.15 "systemctl is-active frr" 2>/dev/null
  register: isp_frr_check
  changed_when: false
  ignore_errors: true

# A real dispatch showed this hang indefinitely (stuck >1h48m, ansible's
# own ConnectTimeout/ServerAliveInterval only guard SSH setup/keepalive,
# not total command duration -- cloud-init status --wait has no timeout
# of its own either). Bounded with `timeout` now; the outer `|| true`
# preserves this task's original best-effort semantics (never fails the
# play) even when the timeout kills it.
- name: Wait for cloud-init to finish on ISP server
  when: isp_frr_check.stdout is not defined or isp_frr_check.stdout != "active"
  shell: timeout -s 9 5m ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 root@192.168.122.15 "cloud-init status --wait 2>/dev/null || true" || true
  changed_when: false

# Unlike the cloud-init wait above, this one is expected to actually
# succeed (FRR is required for the lab to function), so a timeout here
# should fail the play loudly rather than being swallowed. A real dispatch
# showed the original 5m budget exceeded (apt-get install occasionally
# needs more against a slow/cold mirror) -- bumped to 10m and wrapped in a
# retry so a transient mirror hiccup gets a fresh attempt instead of
# failing the whole play outright.
#
# A from-scratch dispatch showed the single retry exhausted almost
# instantly on "Could not get lock /var/lib/apt/lists/lock" -- on a
# genuinely fresh VM boot, cloud-init's own background apt activity
# (unattended-upgrades/apt-daily.timer) can still hold the lock for a
# while after cloud-init itself reports done, and the old 1-retry budget
# gave that no time to clear. Each failed attempt returns in ~1s (it's a
# lock check, not the 10m ssh timeout), so retries are cheap -- raised to
# give the other process real time to finish.
- name: Install and start FRR on ISP server
  when: isp_frr_check.stdout is not defined or isp_frr_check.stdout != "active"
  shell: |
    timeout -s 9 10m ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 root@192.168.122.15 "
      echo 'Acquire::ForceIPv4 \"true\";' > /etc/apt/apt.conf.d/99force-ipv4
      apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y frr 2>&1 | tail -3
      sed -i '/bgpd=no/c\bgpd=yes' /etc/frr/daemons
      test -f /tmp/frr.conf && cp /tmp/frr.conf /etc/frr/frr.conf
      systemctl restart frr
    "
  register: _frr_install
  until: _frr_install.rc == 0
  retries: 20
  delay: 15
