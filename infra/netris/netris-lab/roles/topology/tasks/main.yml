---
- name: Get traefik NodePort for controller access
  shell: kubectl get svc traefik -n kube-system -o jsonpath='{.spec.ports[?(@.name=="web")].nodePort}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: traefik_nodeport
  changed_when: false

- name: Set controller_url fact
  set_fact:
    controller_url: "http://localhost:{{ traefik_nodeport.stdout }}"

- name: Create topology working directory
  file:
    path: "{{ topology_dir }}"
    state: directory

- name: Copy static .tf files
  copy:
    src: "{{ item }}"
    dest: "{{ topology_dir }}/{{ item }}"
  loop:
    - east-west.tf
    - north-south.tf
    - bgp.tf
    - server-cluster-template.tf

- name: Render terraform.tf
  template:
    src: terraform.tf.j2
    dest: "{{ topology_dir }}/terraform.tf"

- name: Render terraform.tfvars
  template:
    src: terraform.tfvars.j2
    dest: "{{ topology_dir }}/terraform.tfvars"

- name: Render ipam-vars.tf
  template:
    src: ipam-vars.tf.j2
    dest: "{{ topology_dir }}/ipam-vars.tf"

- name: Initialize OpenTofu
  shell: tofu init
  args:
    chdir: "{{ topology_dir }}"
    creates: "{{ topology_dir }}/.terraform.lock.hcl"

# A real dispatch hit "Softgate does not have link to the fabric" (Netris
# API 400) on the first apply -- consistent with an OpenTofu resource-order
# race (softgate config applied before its fabric link finished registering,
# since these resources have no explicit depends_on and can be created
# concurrently under default parallelism). `tofu apply` is idempotent, so
# retrying re-applies against the now-partially-created state rather than
# starting over.
- name: Apply topology
  shell: tofu apply -auto-approve
  args:
    chdir: "{{ topology_dir }}"
  register: tofu_apply
  until: tofu_apply.rc == 0
  retries: 3
  delay: 10
  changed_when: "'0 added, 0 changed' not in tofu_apply.stdout"
