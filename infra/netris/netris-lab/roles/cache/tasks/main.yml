---
- name: Create cache directories
  file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ k3s_image_cache_dir }}"
    - "{{ k3s_image_cache_dir }}/../cloud-images"

- name: Pull and save container images
  shell: |
    cache_dir="{{ k3s_image_cache_dir }}"
    for img in {{ container_images | join(' ') }}; do
      fname=$(echo "$img" | sed 's|[/:]|_|g')
      dest="${cache_dir}/${fname}"
      [ -d "$dest" ] && echo "CACHED $img" && continue
      if skopeo copy "docker://${img}" "dir:${dest}" >/dev/null 2>&1; then
        echo "$img" > "${dest}/image-ref"
        echo "SAVED  $img"
      else
        rm -rf "$dest"
        echo "FAILED $img"
      fi
    done
  register: cache_result

- name: Show pull results
  debug:
    msg: "{{ cache_result.stdout }}"

- name: Download cloud images to cache
  get_url:
    url: "{{ item.url }}"
    dest: "{{ k3s_image_cache_dir }}/../cloud-images/{{ item.name }}"
    mode: '0644'
  register: cloud_dl
  until: cloud_dl is success
  retries: 3
  delay: 10
  loop:
    - { url: "{{ cumulus_image_url }}", name: "{{ cumulus_image_name }}" }
    - { url: "{{ ubuntu_image_url }}", name: "{{ ubuntu_image_name }}" }

- name: Copy cloud images to libvirt storage pool
  copy:
    src: "{{ k3s_image_cache_dir }}/../cloud-images/{{ item }}"
    dest: "{{ libvirt_images_dir }}/{{ item }}"
    remote_src: true
    force: false
  loop:
    - "{{ cumulus_image_name }}"
    - "{{ ubuntu_image_name }}"

- name: Cache summary
  shell: |
    total=$(find {{ k3s_image_cache_dir }} -maxdepth 1 -name 'image-ref' -o -type d -name '*_*' 2>/dev/null | wc -l)
    expected={{ container_images | length }}
    cloud=$(ls {{ k3s_image_cache_dir }}/../cloud-images/{{ cumulus_image_name }} {{ k3s_image_cache_dir }}/../cloud-images/{{ ubuntu_image_name }} 2>/dev/null | wc -l)
    echo "Container images: ${total}/${expected}"
    echo "Cloud images: ${cloud}/2"
    echo "Size: $(du -sh /var/cache/netris-lab/ | cut -f1)"
  register: summary
  changed_when: false

- name: Print summary
  debug:
    msg: "{{ summary.stdout }}"
