---
- name: Ensure Netris auth
  ansible.builtin.include_role:
    name: netris.controller.auth
  when: netris_session_cookie is not defined

- name: Get VPCs
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/vpc"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    validate_certs: "{{ netris_validate_certs | default(false) }}"
    timeout: "{{ netris_timeout | default(30) }}"
    status_code: 200
  register: _vpc_resp

- name: Set VPC facts
  ansible.builtin.set_fact:
    netris_vpcs: "{{ _vpc_resp.json.data | default(_vpc_resp.json) }}"
    netris_vpc_by_name: >-
      {{ dict((_vpc_resp.json.data | default(_vpc_resp.json))
         | map(attribute='name') | zip(_vpc_resp.json.data | default(_vpc_resp.json))) }}
