---
# The one uri/get_url call in this play's roles (netris-lab's vendored
# k3s_controller role's "Verify controller API" task) hits the same OpenSSL
# CA-cert-loading bug documented in setup.yml's own comment. That fix is
# scoped at the block level in roles/lab_deploy/tasks/main.yml (around just
# the k3s_controller include) rather than here at the play level -- see that
# file's comment for the full root-cause explanation, including why a
# play-level ca_path default (tried first) still failed identically in a
# real dispatch, and why validate_certs: false is safe there (the target is
# plain http://, no TLS handshake ever occurs).
- name: Deploy Netris lab
  hosts: all
  gather_facts: true
  become: true
  roles:
    - lab_deploy
