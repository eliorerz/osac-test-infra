---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: preflight.yml

- name: Ensure br-mgmt bridge exists
  ansible.builtin.shell: |
    ip link show {{ mgmt_bridge_name }} 2>/dev/null || {
      ip link add name {{ mgmt_bridge_name }} type bridge
      ip addr add {{ mgmt_bridge_cidr }} dev {{ mgmt_bridge_name }}
    }
    ip link set dev {{ mgmt_bridge_name }} up
  changed_when: false

- name: Ensure br-public bridge exists
  ansible.builtin.shell: |
    ip link show {{ public_bridge_name }} 2>/dev/null || {
      ip link add name {{ public_bridge_name }} type bridge
    }
    ip link set dev {{ public_bridge_name }} up
  changed_when: false

- name: Disable reverse path filtering on br-public (isolated mode)
  when: connectivity_mode == "isolated"
  ansible.posix.sysctl:
    name: "net.ipv4.conf.{{ public_bridge_name }}.rp_filter"
    value: "0"
    sysctl_set: true

# k3s_controller's vendored "Verify controller API" task is the only
# uri/get_url call anywhere in that role (confirmed via grep) and hits the
# same OpenSSL CA-cert-loading bug documented in playbooks/deploy-lab.yml's
# own comment. A real dispatch showed that play-level module_defaults'
# ca_path fix (cafile-based loading) still failed identically -- this box's
# openssl-libs build appears to break even file-based cert parsing, not just
# the cadata aggregate path (matches a known, actively-tracked upstream
# OpenSSL regression: https://github.com/openssl/openssl/issues/31807,
# https://github.com/python/cpython/issues/151504 -- no fix published for
# this EL9 build yet).
#
# ansible.module_utils.urls.make_context() calls
# ssl.create_default_context(cafile=cafile) unconditionally, eagerly parsing
# any cafile/ca_path that's set regardless of validate_certs. The only way to
# avoid eager cert-parsing entirely is validate_certs: false (defers to
# Python's lazy default cert lookup, never touches cert bytes). Scoped here
# at the block level (only around this one include_role) rather than
# play-wide: this replaces (not merges with) deploy-lab.yml's play-level
# ca_path default for ansible.builtin.uri within this block (verified
# locally: a block-level module_defaults entry for a module fully overrides
# an outer scope's entry for that same module, it doesn't merge per-key).
#
# This is not a real security weakening: the role's only uri call targets
# "http://localhost:{{ controller_nodeport }}/api/auth" -- plain HTTP, so no
# TLS handshake ever occurs and no certificate is ever actually validated
# regardless of this setting.
- name: Deploy K3s and Netris controller
  module_defaults:
    ansible.builtin.uri:
      validate_certs: false
  block:
    - name: Deploy K3s and Netris controller
      ansible.builtin.include_role:
        name: k3s_controller

- name: Deploy network topology
  ansible.builtin.include_role:
    name: topology

- name: Deploy cloud simulation
  ansible.builtin.include_role:
    name: cloudsim

- name: Configure connectivity
  ansible.builtin.include_role:
    name: connectivity

- name: Verify netris-lab deployment
  ansible.builtin.include_role:
    name: verify
