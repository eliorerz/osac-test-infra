---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: preflight.yml

- name: Ensure br-mgmt bridge exists
  ansible.builtin.shell: |
    ip link show {{ mgmt_bridge_name }} 2>/dev/null || {
      ip link add name {{ mgmt_bridge_name }} type bridge
      ip addr add {{ mgmt_bridge_cidr }} dev {{ mgmt_bridge_name }}
    }
    ip link set dev {{ mgmt_bridge_name }} up
  changed_when: false

- name: Ensure br-public bridge exists
  ansible.builtin.shell: |
    ip link show {{ public_bridge_name }} 2>/dev/null || {
      ip link add name {{ public_bridge_name }} type bridge
    }
    ip link set dev {{ public_bridge_name }} up
  changed_when: false

- name: Disable reverse path filtering on br-public (isolated mode)
  when: connectivity_mode == "isolated"
  ansible.posix.sysctl:
    name: "net.ipv4.conf.{{ public_bridge_name }}.rp_filter"
    value: "0"
    sysctl_set: true

# k3s_controller's vendored "Verify controller API" task hits the same
# OpenSSL CA-cert-loading bug documented in playbooks/deploy-lab.yml's own
# comment; the play-level module_defaults' ca_path fix (cafile-based
# loading) doesn't help here since this box's openssl-libs build breaks
# even file-based cert parsing (matches upstream OpenSSL regression
# https://github.com/openssl/openssl/issues/31807). validate_certs: false
# avoids eager cert-parsing entirely (defers to Python's lazy default cert
# lookup, never touches cert bytes). Scoped at the block level rather than
# play-wide since a block-level module_defaults entry for a module fully
# replaces (not merges with) an outer scope's entry for that same module.
#
# Not a real security weakening: the role's only uri call targets
# "http://localhost:{{ controller_nodeport }}/api/auth" -- plain HTTP, so no
# TLS handshake or certificate validation happens regardless of this setting.
- name: Deploy K3s and Netris controller (validate_certs workaround scope)
  module_defaults:
    ansible.builtin.uri:
      validate_certs: false
  block:
    - name: Deploy K3s and Netris controller
      ansible.builtin.include_role:
        name: k3s_controller

- name: Deploy network topology
  ansible.builtin.include_role:
    name: topology

- name: Deploy cloud simulation
  ansible.builtin.include_role:
    name: cloudsim

- name: Configure connectivity
  ansible.builtin.include_role:
    name: connectivity

- name: Verify netris-lab deployment
  ansible.builtin.include_role:
    name: verify
