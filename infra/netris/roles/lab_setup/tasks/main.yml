---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# Root cause confirmed via a real dispatch. The full traceback (captured
# by running open_url() inside a genuine AnsibleModule instance) shows the
# error is NOT in the network/TLS handshake at all -- it's in
# make_context() -> get_ca_certs(), which (since get_url passes no cafile)
# scans several directories (/etc/pki/ca-trust/extracted/pem, /etc/pki/
# tls/certs, /usr/share/ca-certificates/cacert.org, /etc/ansible) for
# every *.pem/*.crt/*.cer file, reads and concatenates ALL of their
# extracted PEM blocks, then calls context.load_verify_locations(cadata=
# <the concatenation>) on the aggregate.
#
# update-ca-trust extract (regenerating the CA bundles from scratch) was
# tried and did NOT fix it -- ruling out a stale/partial extraction.
# Also: ssl.PEM_cert_to_DER_cert() only base64-decodes a PEM block, it
# does NOT validate the result is a well-formed X.509 DER structure --
# so the earlier "every file's blocks parse fine" check was a weak
# signal that never actually caught the real problem. Test each
# individual certificate the way OpenSSL actually validates it: load it
# alone via ssl.SSLContext.load_verify_locations(cadata=<one DER blob>),
# to find exactly which cert (if any) is malformed at the ASN.1 level,
# not just "does base64-decoding succeed".
- name: DIAGNOSTIC -- validate each individual CA cert via the real OpenSSL parser
  ansible.builtin.shell: |
    set -x
    cat > /tmp/diag_find_bad_cert.py <<'EOF'
    import os, re, ssl

    PEM_RE = re.compile(r'-----BEGIN CERTIFICATE-----.+?-----END CERTIFICATE-----', re.DOTALL)

    paths = [
        '/etc/pki/ca-trust/extracted/pem',
        '/etc/pki/tls/certs',
        '/usr/share/ca-certificates/cacert.org',
        '/etc/ansible',
    ]
    all_ders = []
    for path in paths:
        if not os.path.isdir(path):
            continue
        for f in sorted(os.listdir(path)):
            full_path = os.path.join(path, f)
            if not os.path.isfile(full_path) or os.path.splitext(f)[1] not in ('.pem', '.cer', '.crt'):
                continue
            try:
                with open(full_path, 'r', errors='surrogateescape') as fh:
                    content = fh.read()
            except Exception:
                continue
            for idx, pem in enumerate(PEM_RE.findall(content)):
                try:
                    der = ssl.PEM_cert_to_DER_cert(pem)
                except Exception:
                    continue
                all_ders.append((full_path, idx, der))

    print('total candidate certs:', len(all_ders))
    n_bad = 0
    for full_path, idx, der in all_ders:
        try:
            ctx = ssl.create_default_context()
            ctx.load_verify_locations(cadata=der)
        except Exception as e:
            n_bad += 1
            print('REAL PARSE FAILURE:', full_path, 'block#%d' % idx, 'size=%d' % len(der), '->', repr(e))
    print('done, bad certs found:', n_bad)
    EOF
    python3 /tmp/diag_find_bad_cert.py 2>&1
  register: diag_findbad_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print per-cert validation output
  ansible.builtin.debug:
    var: diag_findbad_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
