---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

# netris-lab's own prerequisites role (EPEL enable + package installs)
# drags in a real openssl-libs upgrade as a side effect (confirmed via a
# real dispatch: 3.2.2-6.el9_5.1 -> 3.5.5-5.el9_8), and that specific
# OpenSSL version breaks Python's ssl.SSLContext.load_verify_locations(
# cadata=...) bytes-based multi-certificate loading path -- the exact
# path ansible.builtin.get_url always uses for CA validation, breaking
# every cloud-image download in the vendored cache role that runs right
# after prerequisites. Verified directly: the identical cadata sanity
# check succeeds against 3.2.2 and fails against 3.5.5 with the exact
# "[ASN1: NOT_ENOUGH_DATA]" error this whole investigation has been
# chasing. Excluding openssl-libs from dnf transactions keeps the pipeline
# on the known-working version without touching get_url's own certificate
# validation behavior at all (unlike disabling validate_certs, which was
# considered and rejected as a real security trade-off).
- name: Exclude openssl-libs from dnf transactions (works around a real OpenSSL regression triggered by prerequisites)
  ansible.builtin.lineinfile:
    path: /etc/dnf/dnf.conf
    insertafter: '^\[main\]'
    regexp: '^exclude='
    line: 'exclude=openssl-libs'

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

- name: Report openssl-libs version after prerequisites (confirms the exclude held)
  ansible.builtin.command:
    cmd: rpm -q openssl-libs
  register: _openssl_libs_version
  changed_when: false

- name: Print openssl-libs version
  ansible.builtin.debug:
    var: _openssl_libs_version.stdout

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
