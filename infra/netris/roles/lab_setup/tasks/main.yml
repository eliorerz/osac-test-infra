---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# TEMPORARY: confirmed via prior dispatches -- a get_url loop before ANY
# prerequisite task succeeds 6/6; the same loop after prerequisites fails
# deterministically 6/6 with the identical instant "Connection failure:
# [ASN1: NOT_ENOUGH_DATA]" error; flushing the ENTIRE nftables ruleset
# right after prerequisites did NOT fix it either -- ruling out nftables/
# NAT and the already-ruled-out rmem_default/rmem_max sysctl. The decisive
# finding: at the exact same post-prerequisites moment, raw Python
# urllib.request.urlopen() (no ansible module involved at all) and curl
# BOTH succeed, while ansible's get_url still fails identically -- this is
# specific to ansible's OWN module execution, not the network/DNS/OS at
# all. ansible.module_utils.urls.open_url() (verified by reading the
# actual ansible-core 2.15.13 source) ALWAYS builds an SSLContext and
# installs a global HTTPSHandler-augmented opener via
# urllib.request.install_opener() before calling urlopen(), even for a
# plain http:// URL, and always sets a custom User-Agent header
# ("ansible-httpget" by default). Isolate which of those two differences
# (if either alone) reproduces the failure in raw Python, without going
# through ansible's module wrapper at all. Remove once the real mechanism
# is confirmed.
- name: DIAGNOSTIC -- isolate ansible's open_url() behavior in raw Python
  ansible.builtin.shell: |
    set -x
    echo "=== A: raw urlopen with ansible's User-Agent header only ==="
    python3 -c "import urllib.request as u; req = u.Request('http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2'); req.add_header('User-agent', 'ansible-httpget'); r = u.urlopen(req, timeout=10); print('SUCCESS', r.status, len(r.read(1024)))" 2>&1
    echo "=== B: raw urlopen with an ansible-style global HTTPSHandler opener installed, default User-Agent ==="
    cat > /tmp/diag_test_b.py <<'EOF'
    import urllib.request, ssl, traceback
    context = ssl.create_default_context()
    handlers = [urllib.request.HTTPSHandler(context=context)]
    opener = urllib.request.build_opener(*handlers)
    urllib.request.install_opener(opener)
    try:
        r = urllib.request.urlopen('http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2', timeout=10)
        print('SUCCESS', r.status, len(r.read(1024)))
    except Exception:
        traceback.print_exc()
    EOF
    python3 /tmp/diag_test_b.py 2>&1
    echo "=== C: both combined (closest replica of ansible's actual open_url(), minus the AnsiballZ wrapper) ==="
    cat > /tmp/diag_test_c.py <<'EOF'
    import urllib.request, ssl, traceback
    context = ssl.create_default_context()
    handlers = [urllib.request.HTTPSHandler(context=context)]
    opener = urllib.request.build_opener(*handlers)
    urllib.request.install_opener(opener)
    try:
        req = urllib.request.Request('http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2')
        req.add_header('User-agent', 'ansible-httpget')
        r = urllib.request.urlopen(req, timeout=10)
        print('SUCCESS', r.status, len(r.read(1024)))
    except Exception:
        traceback.print_exc()
    EOF
    python3 /tmp/diag_test_c.py 2>&1
  register: diag_isolate_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print isolation test output
  ansible.builtin.debug:
    var: diag_isolate_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
