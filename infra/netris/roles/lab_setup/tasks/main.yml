---
# TEMPORARY: a real dispatch showed EVERY individual CA certificate (all
# 701 candidates, not just one bad one) fails identically when loaded via
# ssl.SSLContext.load_verify_locations(cadata=<one DER blob>) -- meaning
# the cadata-based loading API itself appears broken post-prerequisites,
# for any input, not the certificate data. Since raw Python succeeds by
# using ssl.create_default_context()'s own file-based default lookup
# (never exercising the cadata= code path), and real get_url calls
# succeeded before any prerequisite task ran, something changes the
# cadata-loading behavior specifically -- most likely a system openssl-libs
# version change triggered by EPEL/package installs earlier in
# prerequisites. Capture OpenSSL version and a minimal cadata sanity check
# BEFORE prerequisites runs, for direct comparison against the same
# post-prerequisites check already in this file. Remove once the real
# mechanism is confirmed.
- name: DIAGNOSTIC -- OpenSSL version and cadata sanity check before prerequisites
  ansible.builtin.shell: |
    set -x
    openssl version
    rpm -q openssl-libs
    python3 -c "import ssl; print('python ssl.OPENSSL_VERSION:', ssl.OPENSSL_VERSION)"
    python3 -c "
    import ssl, glob
    for f in glob.glob('/etc/pki/ca-trust/extracted/pem/*.pem'):
        with open(f, 'r', errors='surrogateescape') as fh:
            content = fh.read()
        import re
        m = re.search(r'-----BEGIN CERTIFICATE-----.+?-----END CERTIFICATE-----', content, re.DOTALL)
        if not m:
            continue
        der = ssl.PEM_cert_to_DER_cert(m.group(0))
        try:
            ctx = ssl.create_default_context()
            ctx.load_verify_locations(cadata=der)
            print('cadata sanity check on', f, 'SUCCEEDED')
        except Exception as e:
            print('cadata sanity check on', f, 'FAILED ->', repr(e))
        break
    "
  register: diag_preprereq_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print pre-prerequisites OpenSSL/cadata check
  ansible.builtin.debug:
    var: diag_preprereq_result.stdout_lines

- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# TEMPORARY: comparison point -- see the DIAGNOSTIC task above (before
# prerequisites) for the same OpenSSL version/cadata sanity check.
- name: DIAGNOSTIC -- OpenSSL version and cadata sanity check after prerequisites
  ansible.builtin.shell: |
    set -x
    openssl version
    rpm -q openssl-libs
    python3 -c "import ssl; print('python ssl.OPENSSL_VERSION:', ssl.OPENSSL_VERSION)"
    python3 -c "
    import ssl, glob
    for f in glob.glob('/etc/pki/ca-trust/extracted/pem/*.pem'):
        with open(f, 'r', errors='surrogateescape') as fh:
            content = fh.read()
        import re
        m = re.search(r'-----BEGIN CERTIFICATE-----.+?-----END CERTIFICATE-----', content, re.DOTALL)
        if not m:
            continue
        der = ssl.PEM_cert_to_DER_cert(m.group(0))
        try:
            ctx = ssl.create_default_context()
            ctx.load_verify_locations(cadata=der)
            print('cadata sanity check on', f, 'SUCCEEDED')
        except Exception as e:
            print('cadata sanity check on', f, 'FAILED ->', repr(e))
        break
    "
  register: diag_postprereq_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print post-prerequisites OpenSSL/cadata check
  ansible.builtin.debug:
    var: diag_postprereq_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
