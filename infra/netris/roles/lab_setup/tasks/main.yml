---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# netris-lab's own prerequisites role drags in a real openssl-libs upgrade
# as a side effect of its package installs (confirmed via a real dispatch:
# 3.2.2-6.el9_5.1 -> 3.5.5-5.el9_8), and that specific OpenSSL version
# breaks Python's ssl.SSLContext.load_verify_locations(cadata=...) bytes-
# based multi-certificate loading path -- the exact path
# ansible.builtin.get_url always uses for CA validation (confirmed via
# ansible-core's own source and a full traceback), breaking both
# downloads in the vendored cache role's very next task.
#
# Two other fixes were tried and rejected: excluding openssl-libs from dnf
# entirely broke installing libvirt/qemu-kvm outright (a real dispatch
# showed systemd-container -- required by libvirt-daemon-driver-qemu --
# hard-requires a systemd build that itself requires
# libcrypto.so.3(OPENSSL_3.4.0), so blocking the upgrade makes the
# dependency chain unsatisfiable); disabling get_url's validate_certs was
# rejected as an unnecessary security trade-off.
#
# Sidestep get_url's broken code path entirely instead: pre-fetch both
# files ourselves via curl (proven throughout this investigation to be
# completely unaffected by this bug -- it never goes through Python's
# cadata-based loading at all), then inject a matching checksum via
# module_defaults (see playbooks/setup.yml) so the vendored cache role's
# own get_url task takes its "file already exists" shortcut and exits
# before ever calling url_get()/open_url()/make_context(). Verified
# locally: get_url given a matching pre-existing file + checksum but a
# completely unreachable URL still succeeds immediately with "file
# already exists" -- proving the network/TLS code path is genuinely never
# invoked. Full certificate validation is preserved throughout (curl does
# its own TLS validation normally); nothing here weakens security.
- name: Ensure cloud image cache directory exists
  ansible.builtin.file:
    path: "{{ k3s_image_cache_dir }}/../cloud-images"
    state: directory
    mode: '0755'

- name: Pre-fetch cloud images via curl (bypasses get_url's broken CA-cert loading)
  ansible.builtin.command:
    cmd: >-
      curl -fSL --retry 5 --retry-delay 5
      -o "{{ k3s_image_cache_dir }}/../cloud-images/{{ item.name }}"
      "{{ item.url }}"
    creates: "{{ k3s_image_cache_dir }}/../cloud-images/{{ item.name }}"
  loop:
    - { url: "{{ cumulus_image_url }}", name: "{{ cumulus_image_name }}" }
    - { url: "{{ ubuntu_image_url }}", name: "{{ ubuntu_image_name }}" }

- name: Compute checksums of pre-fetched cloud images
  ansible.builtin.stat:
    path: "{{ k3s_image_cache_dir }}/../cloud-images/{{ item }}"
    checksum_algorithm: sha256
  loop:
    - "{{ cumulus_image_name }}"
    - "{{ ubuntu_image_name }}"
  register: _cloud_image_stats

- name: Record checksums for get_url's module_defaults shortcut
  ansible.builtin.set_fact:
    cache_role_checksums: "{{ cache_role_checksums | default({}) | combine({item.item: 'sha256:' + item.stat.checksum}) }}"
  loop: "{{ _cloud_image_stats.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
