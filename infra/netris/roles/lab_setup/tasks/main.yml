---
# TEMPORARY: a prior theory (netris-lab's prerequisites role raising
# net.core.rmem_default above rmem_max) was disproven by a real dispatch --
# reverting rmem_default back down (with rmem_max still raised) did NOT fix
# the get_url failure either, so the sysctl values were never the actual
# cause; the earlier "bisection" that seemed to implicate them was
# confounded by something else. Every dispatch so far shows the SAME
# pattern regardless of which sysctl was tried: an EARLY get_url call in
# the job succeeds, and a LATER one (minutes in, inside the real cache
# role) always fails -- which looks a lot like a time- or request-count-
# based rate limit/block (server-side or a WAF/CDN in front of it), not
# anything about this box's own kernel/network state. Test that directly:
# hit the same URL repeatedly in a tight loop, before ANY prerequisite
# task has run at all, to see whether it starts failing purely as a
# function of repeated requests with zero intervening state changes.
# Remove once the real mechanism is confirmed.
- name: DIAGNOSTIC -- repeated get_url calls before any prerequisites run
  ansible.builtin.shell: |
    set -x
    cat > /tmp/diag_loop.yml <<'EOF'
    ---
    - hosts: localhost
      gather_facts: false
      connection: local
      tasks:
        - ansible.builtin.get_url:
            url: "http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2"
            dest: "/tmp/diag_loop.qcow2"
            mode: '0644'
            timeout: 10
          register: r
          ignore_errors: true
        - debug: var=r
    EOF
    for i in 1 2 3 4 5 6; do
      echo "=== attempt $i at $(date -u +%H:%M:%S.%N) ==="
      rm -f /tmp/diag_loop.qcow2
      ansible-playbook /tmp/diag_loop.yml -v 2>&1 | grep -E "elapsed|msg|status_code|failed"
    done
  register: diag_loop_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print repeated get_url loop output
  ansible.builtin.debug:
    var: diag_loop_result.stdout_lines

- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
