---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# TEMPORARY: confirmed via prior dispatches -- a get_url loop before ANY
# prerequisite task succeeds 6/6; the same loop after prerequisites fails
# deterministically 6/6 with the identical instant "Connection failure:
# [ASN1: NOT_ENOUGH_DATA]" error; flushing the ENTIRE nftables ruleset
# right after prerequisites (a much stronger intervention than reverting
# any one rule) did NOT fix it either -- ruling out nftables/NAT and the
# already-ruled-out rmem_default/rmem_max sysctl as the cause. Also:
# prerequisites' OWN early "Download Go" task (get_url, from go.dev)
# succeeds fine, proving get_url itself works fine well INTO the
# prerequisites role, before whatever the real trigger is. Since it's
# neither the network/firewall config nor an ansible/python version issue
# (both fully eliminated), test whether it's specific to ansible's module
# execution at all: compare a raw Python urllib call (no ansible module
# wrapper), curl, and ansible's get_url side by side at the exact same
# moment, plus DNS resolution state, to see if the failure is OS/DNS-level
# (all three would fail) or specific to how ansible executes modules (only
# get_url fails). Remove once the real mechanism is confirmed.
- name: DIAGNOSTIC -- compare raw Python vs curl vs ansible get_url post-prerequisites
  ansible.builtin.shell: |
    set -x
    echo "=== DNS resolution state ==="
    cat /etc/resolv.conf
    getent hosts downloads.netris.ai
    python3 -c "import socket; print(socket.getaddrinfo('downloads.netris.ai', 80))"
    echo "=== raw Python urllib (no ansible module wrapper) ==="
    python3 -c "import urllib.request as u; r = u.urlopen('http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2', timeout=10); print('SUCCESS', r.status, len(r.read(1024)))" 2>&1
    echo "=== curl (paired at the same moment) ==="
    curl -v --max-time 15 -o /dev/null -r 0-1000000 "http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2" 2>&1 | tail -25
    echo "=== ansible get_url (paired at the same moment) ==="
    cat > /tmp/diag_compare.yml <<'EOF'
    ---
    - hosts: localhost
      gather_facts: false
      connection: local
      tasks:
        - ansible.builtin.get_url:
            url: "http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2"
            dest: "/tmp/diag_compare.qcow2"
            mode: '0644'
            timeout: 10
          register: r
          ignore_errors: true
        - debug: var=r
    EOF
    ansible-playbook /tmp/diag_compare.yml -v 2>&1 | tail -30
  register: diag_compare_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print raw Python vs curl vs ansible get_url comparison
  ansible.builtin.debug:
    var: diag_compare_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
