---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# TEMPORARY: confirmed via prior dispatches -- get_url before prerequisites
# succeeds; after prerequisites it fails deterministically with "Connection
# failure: [ASN1: NOT_ENOUGH_DATA]"; nftables/NAT and rmem_default/rmem_max
# sysctl are both ruled out. Raw Python replicating ansible's exact
# open_url() logic (SSLContext + global HTTPSHandler opener install +
# custom "ansible-httpget" User-Agent, all three combined) succeeds fine
# when run from /tmp -- ruling out open_url()'s own logic as the cause too.
# The one remaining, untested difference: ansible.module_utils.urls.
# fetch_url() (the real caller inside get_url.py) redirects Python's global
# tempfile.tempdir to module.tmpdir before calling open_url() -- and the
# real AnsiballZ module script itself executes from under
# /root/.ansible/tmp/ansible-tmp-*, not /tmp. This is a SELinux-enforcing
# RHEL box (prerequisites explicitly disables SELinux for libvirt qemu,
# implying it's enabled/enforcing for everything else); /root/.ansible/tmp
# may carry a different SELinux context than /tmp. Test whether merely
# running the exact same raw-Python replica FROM that directory (with
# tempfile.tempdir redirected there too, matching fetch_url() exactly)
# reproduces the failure. Remove once the real mechanism is confirmed.
- name: DIAGNOSTIC -- test from an ansible-tmp-style directory, matching fetch_url() exactly
  ansible.builtin.shell: |
    set -x
    echo "=== SELinux enforcement status ==="
    getenforce || echo "(getenforce not available)"
    echo "=== recent AVC denials, if any ==="
    ausearch -m avc -ts recent 2>&1 | tail -40 || echo "(ausearch not available or no denials)"
    echo "=== security context comparison: /tmp vs an ansible-tmp-style dir ==="
    mkdir -p /root/.ansible/tmp/diag-ansible-tmp-test
    ls -Zd /tmp /root/.ansible/tmp/diag-ansible-tmp-test
    echo "=== raw Python replica of open_url(), executed FROM /root/.ansible/tmp/..., with tempfile.tempdir redirected there too (matches fetch_url() exactly) ==="
    cat > /root/.ansible/tmp/diag-ansible-tmp-test/diag_test_d.py <<'EOF'
    import urllib.request, ssl, tempfile, traceback
    tempfile.tempdir = '/root/.ansible/tmp/diag-ansible-tmp-test'
    context = ssl.create_default_context()
    handlers = [urllib.request.HTTPSHandler(context=context)]
    opener = urllib.request.build_opener(*handlers)
    urllib.request.install_opener(opener)
    try:
        req = urllib.request.Request('http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2')
        req.add_header('User-agent', 'ansible-httpget')
        r = urllib.request.urlopen(req, timeout=10)
        print('SUCCESS', r.status, len(r.read(1024)))
    except Exception:
        traceback.print_exc()
    EOF
    cd /root/.ansible/tmp/diag-ansible-tmp-test && python3 diag_test_d.py 2>&1
  register: diag_selinux_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print SELinux/ansible-tmp-directory test output
  ansible.builtin.debug:
    var: diag_selinux_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
