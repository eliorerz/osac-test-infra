---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# TEMPORARY: confirmed via prior dispatches -- get_url before prerequisites
# succeeds; after prerequisites it fails deterministically with "Connection
# failure: [ASN1: NOT_ENOUGH_DATA]"; nftables/NAT, rmem_default/rmem_max
# sysctl, and SELinux context/tempfile.tempdir under /root/.ansible/tmp are
# all ruled out (a raw-Python replica of open_url()'s exact logic succeeds
# even run from that exact directory with that exact context). Every
# code-level difference in open_url() itself (SSLContext + global
# HTTPSHandler opener + custom User-Agent) has been replicated and still
# succeeds as a bare script. The one thing no raw-script replica can
# reproduce: actually executing inside a real ansible.module_utils.basic.
# AnsibleModule instance (the harness get_url.py itself runs inside,
# created before get_url's own body ever calls fetch_url()/open_url()).
# Test that directly with a minimal custom module that does nothing but
# instantiate a real AnsibleModule and then call open_url() -- with a raw
# try/except that captures the FULL traceback, since fetch_url()'s own
# `except socket.error` handler (confirmed in the ansible-core source to
# be what produces "Connection failure: ...") discards the traceback,
# hiding exactly where in the call stack the error originates. Remove once
# the real mechanism is confirmed.
- name: DIAGNOSTIC -- run open_url() inside a real AnsibleModule harness
  ansible.builtin.shell: |
    set -x
    mkdir -p /tmp/diag_library
    cat > /tmp/diag_library/diag_open_url_test.py <<'EOF'
    #!/usr/bin/python
    from ansible.module_utils.basic import AnsibleModule
    from ansible.module_utils.urls import open_url
    import traceback

    def main():
        module = AnsibleModule(argument_spec=dict(url=dict(type='str', required=True)))
        try:
            r = open_url(module.params['url'], method='GET', timeout=10, http_agent='ansible-httpget')
            module.exit_json(changed=False, status=r.status, size=len(r.read(1024)))
        except Exception as e:
            module.exit_json(changed=False, failed=True, msg=str(e), full_traceback=traceback.format_exc())

    if __name__ == '__main__':
        main()
    EOF
    cat > /tmp/diag_ansible_module_test.yml <<'EOF'
    ---
    - hosts: localhost
      gather_facts: false
      connection: local
      tasks:
        - diag_open_url_test:
            url: "http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2"
          register: r
          ignore_errors: true
        - debug: var=r
    EOF
    echo "=== real AnsibleModule harness + open_url(), full traceback on failure ==="
    ANSIBLE_LIBRARY=/tmp/diag_library ansible-playbook /tmp/diag_ansible_module_test.yml -v 2>&1 | tail -60
  register: diag_module_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print AnsibleModule harness test output
  ansible.builtin.debug:
    var: diag_module_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
