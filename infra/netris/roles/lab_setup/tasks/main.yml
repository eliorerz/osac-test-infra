---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# TEMPORARY: a 6x repeated get_url loop run BEFORE any prerequisite task
# had run at all (a prior dispatch) succeeded 6/6 -- ruling out both a
# request-count/rate-limit theory AND (since two different rmem_default/
# rmem_max configurations were already tested and disproven) leaving the
# prerequisites role's OTHER state mutations as the remaining suspects:
# specifically "Configure libvirt to use nftables backend", "Flush
# restrictive libvirt nftables chains", and "Masquerade VM bridge traffic
# for internet access" (NAT/masquerade rules). Repeat the same 6x loop
# here, right after prerequisites has fully run (all those mutations
# applied), to see whether failure is now deterministic (100% of 6, likely
# nftables/NAT being the actual cause) or intermittent (e.g. only fails
# immediately post-mutation while nftables/conntrack state settles, which
# would explain why a single post-mutation test failed before while this
# repeated test might show it clearing up after the first attempt or two).
# Remove once the real mechanism is confirmed.
- name: DIAGNOSTIC -- repeated get_url calls after prerequisites has run
  ansible.builtin.shell: |
    set -x
    echo "=== live sysctl/nft state after prerequisites ==="
    sysctl net.core.rmem_default net.core.rmem_max
    nft list ruleset 2>&1 | head -100 || echo "(nft not available)"
    cat > /tmp/diag_loop2.yml <<'EOF'
    ---
    - hosts: localhost
      gather_facts: false
      connection: local
      tasks:
        - ansible.builtin.get_url:
            url: "http://downloads.netris.ai/cumulus-linux-5.11.3-vx-amd64-qemu.qcow2"
            dest: "/tmp/diag_loop2.qcow2"
            mode: '0644'
            timeout: 10
          register: r
          ignore_errors: true
        - debug: var=r
    EOF
    for i in 1 2 3 4 5 6; do
      echo "=== attempt $i at $(date -u +%H:%M:%S.%N) ==="
      rm -f /tmp/diag_loop2.qcow2
      ansible-playbook /tmp/diag_loop2.yml -v 2>&1 | grep -E "elapsed|msg|status_code|failed"
    done
  register: diag_loop2_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print repeated get_url loop output (post-prerequisites)
  ansible.builtin.debug:
    var: diag_loop2_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
