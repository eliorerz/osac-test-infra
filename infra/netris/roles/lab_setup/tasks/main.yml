---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

# TEMPORARY: root cause finally isolated via a real dispatch. The full
# traceback (captured by running open_url() inside a genuine AnsibleModule
# instance) shows the error is NOT in the network/TLS handshake at all --
# it's in make_context() -> get_ca_certs(), which (since get_url passes no
# cafile) scans several directories (/etc/pki/ca-trust/extracted/pem,
# /etc/pki/tls/certs, /usr/share/ca-certificates/cacert.org, /etc/ansible)
# for every *.pem/*.crt/*.cer file, reads and concatenates ALL of their
# extracted PEM blocks, then calls context.load_verify_locations(cadata=
# <the concatenation>) on the aggregate. If even ONE scanned file is
# corrupted/truncated, the whole aggregate fails to parse. This explains
# why raw Python succeeds every time: ssl.create_default_context() with no
# explicit cafile uses OpenSSL's own single default cafile lookup, not
# ansible's multi-directory scan-and-concatenate.
#
# A first attempt at this diagnostic called ansible.module_utils.urls'
# OWN extract_pem_certs()/get_ca_certs() helpers directly and hit
# TypeErrors/ValueErrors -- turned out to be a version mismatch (this box
# runs the pip-installed ansible-core 2.15.13, whose internal, private
# helper signatures differ from other versions), not a new finding. Avoid
# any dependency on those private, version-specific internals: scan the
# same directories and PEM-parse each file with a self-contained regex,
# matching only what ssl.PEM_cert_to_DER_cert() itself actually needs.
# Remove once the real mechanism is confirmed.
- name: DIAGNOSTIC -- pinpoint the corrupted CA cert file get_ca_certs() aggregates
  ansible.builtin.shell: |
    set -x
    cat > /tmp/diag_find_bad_cert.py <<'EOF'
    import os, re, ssl

    PEM_RE = re.compile(r'-----BEGIN CERTIFICATE-----.+?-----END CERTIFICATE-----', re.DOTALL)

    paths = [
        '/etc/pki/ca-trust/extracted/pem',
        '/etc/pki/tls/certs',
        '/usr/share/ca-certificates/cacert.org',
        '/etc/ansible',
    ]
    all_certs = []
    for path in paths:
        if not os.path.isdir(path):
            print('SKIP (not a dir):', path)
            continue
        for f in sorted(os.listdir(path)):
            full_path = os.path.join(path, f)
            if not os.path.isfile(full_path) or os.path.splitext(f)[1] not in ('.pem', '.cer', '.crt'):
                continue
            size = os.path.getsize(full_path)
            try:
                with open(full_path, 'r', errors='surrogateescape') as fh:
                    content = fh.read()
                blocks = PEM_RE.findall(content)
                n_ok = 0
                for pem in blocks:
                    try:
                        der = ssl.PEM_cert_to_DER_cert(pem)
                        all_certs.append(der)
                        n_ok += 1
                    except Exception as e:
                        print('BAD CERT BLOCK in', full_path, 'size=%d' % size, '->', repr(e))
                print('OK', full_path, 'size=%d' % size, 'blocks=%d' % len(blocks), 'parsed_ok=%d' % n_ok)
            except Exception as e:
                print('READ FAILED', full_path, 'size=%d' % size, '->', repr(e))

    print('=== aggregate load_verify_locations() test, exactly like make_context() does ===')
    try:
        cadata = bytearray()
        for der in all_certs:
            cadata.extend(der)
        ctx = ssl.create_default_context()
        ctx.load_verify_locations(cadata=cadata)
        print('load_verify_locations() on the aggregate of', len(all_certs), 'certs SUCCEEDED')
    except Exception as e:
        print('load_verify_locations() on the aggregate FAILED ->', repr(e))
    EOF
    python3 /tmp/diag_find_bad_cert.py 2>&1
  register: diag_findbad_result
  changed_when: false
  ignore_errors: true

- name: DIAGNOSTIC -- print corrupted-CA-file pinpoint output
  ansible.builtin.debug:
    var: diag_findbad_result.stdout_lines

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

- name: Check if fulfillment-service already exists
  ansible.builtin.stat:
    path: /opt/fulfillment-service
  register: _fs_exists

- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: /opt/fulfillment-service
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  when: not _fs_exists.stat.exists

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o /usr/local/bin/osac ./cmd/osac
    chdir: /opt/fulfillment-service
    creates: /usr/local/bin/osac
  environment:
    GOPATH: /root/go
    GOCACHE: /root/.cache/go-build

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
