---
# Prep steps below are copied from roles/osac_refresh (clone/build/values-prep
# is identical regardless of adopt-vs-fresh) minus its two adopt-only steps:
# "scale down osac-ui deployment if running" (nothing is running yet on a
# clean snapshot) and the Keycloak-client-secret-preservation block (there's
# no existing Keycloak/clients to preserve secrets from on a fresh install --
# install-prereqs generates fresh ones normally).
- name: Clone osac-installer
  ansible.builtin.git:
    repo: "{{ osac_installer_repo }}"
    dest: "{{ osac_installer_dir }}"
    version: "{{ osac_installer_branch }}"
    force: true
  when: not (osac_installer_skip_clone | default(false) | bool)

- name: Initialize submodules
  ansible.builtin.command:
    cmd: git submodule update --init --recursive
    chdir: "{{ osac_installer_dir }}"
  register: _submodule_update
  changed_when: _submodule_update.stdout | length > 0
  when: not (osac_installer_skip_clone | default(false) | bool)

- name: Override osac-operator code in installer
  ansible.builtin.git:
    repo: "{{ osac_operator_repo }}"
    dest: "{{ osac_installer_dir }}/base/osac-operator"
    version: "{{ osac_operator_branch }}"
    force: true
  when:
    - not (osac_installer_skip_clone | default(false) | bool)
    - osac_operator_branch | default('') | length > 0

- name: Override fulfillment-service code in installer
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: "{{ osac_installer_dir }}/base/osac-fulfillment-service"
    version: "{{ fulfillment_service_branch }}"
    force: true
  when:
    - not (osac_installer_skip_clone | default(false) | bool)
    - fulfillment_service_branch | default('') | length > 0

# Job-scoped, non-root install -- see the identical note in
# roles/osac_refresh/tasks/main.yml and roles/lab_setup/tasks/main.yml.
- name: Ensure non-root install directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/bin"
    state: directory
    mode: "0755"
  become: false
  when: not (osac_installer_skip_clone | default(false) | bool)

- name: Rebuild osac CLI from fulfillment-service
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o "{{ lookup('env', 'HOME') }}/.local/bin/osac" ./cmd/osac
    chdir: "{{ osac_installer_dir }}/base/osac-fulfillment-service"
  become: false
  environment:
    GOPATH: "{{ lookup('env', 'HOME') }}/go"
    GOCACHE: "{{ lookup('env', 'HOME') }}/.cache/go-build"
  when: not (osac_installer_skip_clone | default(false) | bool)

- name: Determine values directory
  ansible.builtin.set_fact:
    _values_dir: "{{ snapshot_osac_values_file | dirname }}"

- name: Ensure values directory exists
  ansible.builtin.file:
    path: "{{ osac_installer_dir }}/{{ _values_dir }}"
    state: directory
    mode: "0755"

- name: Copy AAP license to values directory
  ansible.builtin.copy:
    src: "{{ osac_license_path }}"
    dest: "{{ osac_installer_dir }}/{{ _values_dir }}/license.zip"
    remote_src: true
    mode: "0644"

- name: Copy pull-secret to values directory
  ansible.builtin.copy:
    src: "{{ pull_secret_path }}"
    dest: "{{ osac_installer_dir }}/{{ _values_dir }}/pull-secret.json"
    remote_src: true
    mode: "0644"

- name: Override fulfillment-service image in values file
  ansible.builtin.shell:
    cmd: |
      sed -i 's|[a-zA-Z0-9./_-]*fulfillment-service:[a-zA-Z0-9._-]*|{{ fulfillment_service_image }}|g' \
        {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}
  when: fulfillment_service_image | default('') | length > 0

- name: Override osac-operator image in values file
  ansible.builtin.shell:
    cmd: |
      REPO="{{ osac_operator_image | regex_replace(':[^/]+$', '') }}"
      TAG="{{ osac_operator_image | regex_search(':[^/]+$') | regex_replace('^:', '') | default('latest', true) }}"
      sed -i "s|[a-zA-Z0-9./_-]*osac-operator:[a-zA-Z0-9._-]*|{{ osac_operator_image }}|g" \
        {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}
      sed -i "/repository: .*osac-operator/{s|repository: .*|repository: ${REPO}|;n;s/tag: .*/tag: ${TAG}/}" \
        {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}
  when: osac_operator_image | default('') | length > 0

- name: Override osac-aap image in values file
  ansible.builtin.shell:
    cmd: |
      sed -i 's|[a-zA-Z0-9./_-]*osac-aap:[a-zA-Z0-9._-]*|{{ osac_aap_image }}|g' \
        {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}
  when: osac_aap_image | default('') | length > 0

- name: Override AAP project git URI in values file
  ansible.builtin.shell:
    cmd: |
      sed -i 's|projectGitUri: .*|projectGitUri: "{{ osac_aap_repo }}"|' \
        {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}
  # Unconditional -- see the identical note in roles/osac_refresh.

- name: Override AAP project git branch in values file
  ansible.builtin.shell:
    cmd: |
      sed -i 's|projectGitBranch: .*|projectGitBranch: "{{ osac_aap_branch }}"|' \
        {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}
  when: osac_aap_branch | default('') | length > 0

- name: Disable osac-ui (image not published yet)
  ansible.builtin.shell:
    cmd: |
      if grep -q 'osac-ui' {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}; then
        sed -i '/^ui:/,/^[a-z]/{s/enabled: true/enabled: false/}' \
          {{ osac_installer_dir }}/{{ snapshot_osac_values_file }}
      fi
  changed_when: false

- name: Build list of CI images to pre-pull
  ansible.builtin.set_fact:
    _prepull_images: >-
      {{
        ([] +
         ([fulfillment_service_image] if fulfillment_service_image | default('') | length > 0 else []) +
         ([osac_operator_image] if osac_operator_image | default('') | length > 0 else []) +
         ([osac_aap_image] if osac_aap_image | default('') | length > 0 else []))
      }}

- name: Pre-pull CI images onto SNO node
  ansible.builtin.shell:
    cmd: >-
      ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10
      -i {{ snapshot_flavor_dir }}/crypto/cluster-tool.key
      core@{{ ocp_dnat_ip }}
      "sudo crictl pull '{{ item }}'"
  loop: "{{ _prepull_images }}"
  loop_control:
    label: "{{ item.split('/')[-1] }}"
  register: _prepull_result
  until: _prepull_result.rc == 0
  retries: 5
  delay: 30
  when: _prepull_images | length > 0

# --- Real install (this is the part that differs from osac_refresh) ---
# Mirrors .github/workflows/e2e-vmaas-full-install.yml's "Install
# infrastructure operators"/"Install OSAC" steps: install-operators,
# install-prereqs, install-osac are osac-installer's own Makefile targets
# (Helm-based), the same ones that workflow already runs successfully
# against a clean sno-4-22 boot.
#
# openshift-marketplace's catalog-source pods are created automatically
# during cluster boot/recert, *before* restore-snapshot's own "Fix
# pull-secret in openshift-config" workaround (recert writes the
# pull-secret's value as a literal path instead of real JSON content) has
# propagated to the node's /var/lib/kubelet/config.json via the MCP resync
# it waits for. So these pods attempt their initContainer image pull with
# the still-broken secret, land in ImagePullBackOff, and never retry on
# their own even once the file is corrected -- confirmed live on a
# sno-4-22 restore (redhat-operators/community-operators/certified-operators
# all stuck 17+ minutes later). Invisible on the golden caas snapshot, which
# never needs a fresh registry pull post-restore. Deleting them forces a
# recreate against the by-then-corrected file.
- name: Restart marketplace catalog pods to pick up the corrected pull-secret
  ansible.builtin.command:
    cmd: oc delete pods -n openshift-marketplace -l olm.managed=true --ignore-not-found
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Wait for CatalogSource redhat-operators to be READY
  ansible.builtin.command:
    cmd: >-
      oc wait --for=jsonpath={.status.connectionState.lastObservedState}=READY
      catalogsource/redhat-operators -n openshift-marketplace --timeout=300s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  register: _catalogsource_ready
  until: _catalogsource_ready.rc == 0
  retries: 3
  delay: 5

- name: Install OLM operators (make install-operators)
  ansible.builtin.command:
    cmd: make install-operators VALUES_FILE={{ snapshot_osac_values_file }}
    chdir: "{{ osac_installer_dir }}"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Configure prerequisites (make install-prereqs)
  ansible.builtin.command:
    cmd: make install-prereqs VALUES_FILE={{ snapshot_osac_values_file }}
    chdir: "{{ osac_installer_dir }}"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Deploy OSAC via Helm (make install-osac)
  ansible.builtin.command:
    cmd: make install-osac VALUES_FILE={{ snapshot_osac_values_file }}
    chdir: "{{ osac_installer_dir }}"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Create CI test tenants
  ansible.builtin.shell:
    cmd: |
      oc apply -f - <<EOF
      apiVersion: osac.openshift.io/v1alpha1
      kind: Tenant
      metadata:
        name: {{ item }}
        namespace: {{ snapshot_osac_namespace }}
      spec: {}
      EOF
  environment:
    KUBECONFIG: /root/.kube/config
  loop:
    - "{{ snapshot_osac_namespace }}"
    - shared
  changed_when: true

# Only meaningful post-install -- the AutomationPlatform CR doesn't exist
# until install-osac creates it, unlike osac_refresh's copy of this same
# task (which runs against an already-existing, adopted install).
- name: Disable EDA in AAP platform CR (OSAC-1624 removed EDA)
  ansible.builtin.shell:
    cmd: |
      if oc get ansibleautomationplatform osac-aap -n {{ snapshot_osac_namespace }} >/dev/null 2>&1; then
        oc patch ansibleautomationplatform osac-aap -n {{ snapshot_osac_namespace }} \
          --type merge -p '{"spec":{"eda":{"disabled":true}}}'
      fi
      oc delete eda osac-aap-eda -n {{ snapshot_osac_namespace }} --ignore-not-found
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Report OSAC fresh install completed
  ansible.builtin.debug:
    msg: "OSAC fresh install completed — ready for post-osac (MCE OS_IMAGES filtering) and post-snapshot-refresh (Netris wiring)"
